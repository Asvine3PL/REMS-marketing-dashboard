<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3P Learning Command Centre · FY26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --c-brand:#2563eb; --c-brand-dim:#1d4ed8; --c-brand-soft:#eff6ff; --c-brand-glow:rgba(37,99,235,.15);
  --c-bg:#f0f2f5; --c-surface:#ffffff; --c-surface-2:#f8fafc; --c-surface-3:#f1f5f9;
  --c-overlay:rgba(0,0,0,.45);
  --c-border:#e2e8f0; --c-border-2:#cbd5e1; --c-border-3:#94a3b8;
  --c-text:#0f172a; --c-text-2:#334155; --c-text-3:#64748b; --c-text-4:#94a3b8; --c-text-inv:#ffffff;
  --c-grn:#16a34a; --c-grn-bg:#f0fdf4; --c-grn-br:#86efac; --c-grn-dk:#14532d;
  --c-red:#dc2626; --c-red-bg:#fef2f2; --c-red-br:#fca5a5; --c-red-dk:#7f1d1d;
  --c-amb:#d97706; --c-amb-bg:#fffbeb; --c-amb-br:#fcd34d; --c-amb-dk:#78350f;
  --c-pur:#7c3aed; --c-pur-bg:#f5f3ff; --c-pur-br:#c4b5fd; --c-pur-dk:#4c1d95;
  --c-cyn:#0891b2; --c-cyn-bg:#ecfeff; --c-cyn-br:#67e8f9; --c-cyn-dk:#164e63;
  --c-pnk:#db2777; --c-pnk-bg:#fdf2f8; --c-pnk-br:#f9a8d4; --c-pnk-dk:#831843;
  --c-org:#ea580c; --c-org-bg:#fff7ed; --c-org-br:#fdba74; --c-org-dk:#7c2d12;
  --sh-1:0 1px 2px rgba(0,0,0,.06);
  --sh-2:0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-3:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --sh-4:0 8px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.08);
  --r-sm:5px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-full:999px;
  --sb-w:232px; --topbar-h:56px; --filterbar-h:48px;
  --t-fast:.12s ease; --t-mid:.2s ease; --t-slow:.3s cubic-bezier(.4,0,.2,1);
  --chart-1:#2563eb; --chart-2:#16a34a; --chart-3:#d97706;
  --chart-4:#7c3aed; --chart-5:#0891b2; --chart-6:#db2777; --chart-7:#ea580c; --chart-8:#65a30d;
}
[data-theme="dark"] {
  --c-bg:#0a0d12; --c-surface:#111318; --c-surface-2:#191d24; --c-surface-3:#21262f;
  --c-border:#252b36; --c-border-2:#323847; --c-border-3:#4a5568;
  --c-text:#f1f5f9; --c-text-2:#cbd5e1; --c-text-3:#8892a4; --c-text-4:#525d72;
  --c-brand-soft:#1e2d4f;
  --sh-1:0 1px 2px rgba(0,0,0,.3); --sh-2:0 1px 4px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.2);
  --sh-3:0 4px 12px rgba(0,0,0,.5),0 2px 4px rgba(0,0,0,.3);
  --sh-4:0 8px 32px rgba(0,0,0,.6),0 4px 8px rgba(0,0,0,.4);
}

* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; font-family:'Inter',sans-serif; background:var(--c-bg); color:var(--c-text); -webkit-font-smoothing:antialiased; }
button, input, select { font-family:inherit; }

.app { display:flex; height:100vh; overflow:hidden; }

/* ── SIDEBAR ── */
.sb { width:var(--sb-w); background:var(--c-surface); border-right:1px solid var(--c-border); display:flex; flex-direction:column; flex-shrink:0; }
.sb-hdr { padding:16px 18px; border-bottom:1px solid var(--c-border); display:flex; align-items:center; gap:10px; }
.sb-logo { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,#2563eb,#7c3aed); display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 4px 12px rgba(37,99,235,.3); }
.sb-name { font-weight:800; font-size:14px; letter-spacing:-.02em; line-height:1.1; }
.sb-sub { font-size:10px; color:var(--c-text-3); margin-top:2px; }
.sb-nav { flex:1; overflow-y:auto; padding:10px 8px 12px; }
.sb-nav::-webkit-scrollbar { width:6px; }
.sb-nav::-webkit-scrollbar-thumb { background:var(--c-border-2); border-radius:3px; }
.sb-sec-lbl { font-size:9px; font-weight:800; color:var(--c-text-4); text-transform:uppercase; letter-spacing:.08em; padding:14px 12px 6px; }
.sb-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--r-md); cursor:pointer; font-size:12.5px; font-weight:500; color:var(--c-text-2); border:none; background:transparent; width:100%; text-align:left; transition:all var(--t-fast); }
.sb-item:hover { background:var(--c-surface-3); color:var(--c-text); }
.sb-item.active { background:var(--c-brand-soft); color:var(--c-brand); font-weight:600; }
[data-theme="dark"] .sb-item.active { color:#93c5fd; }
.sb-icon { font-size:14px; width:18px; text-align:center; }
.sb-badge { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:var(--c-red); color:#fff; font-size:9px; font-weight:800; line-height:1; flex-shrink:0; }
.sb-foot { padding:10px 12px; border-top:1px solid var(--c-border); display:flex; align-items:center; gap:8px; font-size:11px; color:var(--c-text-3); }
.sb-dot { width:6px; height:6px; border-radius:50%; background:var(--c-grn); box-shadow:0 0 6px rgba(22,163,74,.5); }

/* Section pill in KPI strip */
.kpi-section-pill {
  padding:5px 11px; border-radius:var(--r-md); font-size:10px; font-weight:800; letter-spacing:.06em;
  color:#fff; flex-shrink:0; white-space:nowrap; align-self:center;
  text-transform:uppercase;
}
.kpi-section-pill[data-section="exec"] { background:linear-gradient(135deg,#7c3aed,#5b21b6); box-shadow:0 2px 6px rgba(124,58,237,.3); }
.kpi-section-pill[data-section="acq"]  { background:linear-gradient(135deg,#2563eb,#1d4ed8); box-shadow:0 2px 6px rgba(37,99,235,.3); }
.kpi-section-pill[data-section="perf"] { background:linear-gradient(135deg,#dc2626,#991b1b); box-shadow:0 2px 6px rgba(220,38,38,.3); }
.kpi-section-pill[data-section="sgi"]  { background:linear-gradient(135deg,#0891b2,#155e75); box-shadow:0 2px 6px rgba(8,145,178,.3); }
.kpi-section-pill[data-section="rev"]  { background:linear-gradient(135deg,#d97706,#b45309); box-shadow:0 2px 6px rgba(217,119,6,.3); }
.kpi-section-pill[data-section="org"]  { background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 2px 6px rgba(22,163,74,.3); }

/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:var(--topbar-h); background:var(--c-surface); border-bottom:1px solid var(--c-border); display:flex; align-items:center; padding:0 18px; gap:14px; flex-shrink:0; }
.kpi-strip { flex:1; display:flex; gap:8px; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding:6px 0; }
.kpi-strip::-webkit-scrollbar { display:none; }
.kpi-mini { display:flex; align-items:center; gap:7px; padding:5px 10px; border:1px solid var(--c-border); border-radius:var(--r-md); background:var(--c-surface); white-space:nowrap; flex-shrink:0; transition:all var(--t-fast); }
.kpi-mini:hover { background:var(--c-surface-2); border-color:var(--c-border-2); }
.kpi-mini-lbl { font-size:9.5px; font-weight:700; color:var(--c-text-3); text-transform:uppercase; letter-spacing:.04em; }
.kpi-mini-val { font-size:13px; font-weight:800; color:var(--c-text); font-variant-numeric:tabular-nums; }
.kpi-mini-delta { font-size:9.5px; font-weight:700; padding:1px 5px; border-radius:var(--r-full); }
.kpi-mini-delta.up { background:var(--c-grn-bg); color:var(--c-grn); }
.kpi-mini-delta.dn { background:var(--c-red-bg); color:var(--c-red); }
.kpi-mini-delta.neu { background:var(--c-surface-3); color:var(--c-text-4); }
.tb-actions { display:flex; gap:6px; align-items:center; }
.tb-btn { width:34px; height:34px; border-radius:var(--r-md); border:1px solid var(--c-border); background:var(--c-surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--c-text-2); transition:all var(--t-fast); }
.tb-btn:hover { background:var(--c-surface-3); border-color:var(--c-border-2); }

/* ── FILTER BAR ── */
.fb { height:var(--filterbar-h); background:var(--c-surface); border-bottom:1px solid var(--c-border); display:flex; align-items:center; gap:14px; padding:0 18px; flex-shrink:0; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; }
.fb::-webkit-scrollbar { display:none; }
.fb-grp { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.fb-lbl { font-size:10px; font-weight:700; color:var(--c-text-4); text-transform:uppercase; letter-spacing:.05em; margin-right:2px; }
.pill { padding:4px 10px; border-radius:var(--r-full); font-size:11px; font-weight:600; border:1px solid var(--c-border); background:var(--c-surface); color:var(--c-text-3); cursor:pointer; transition:all var(--t-fast); white-space:nowrap; }
.pill.on { background:var(--c-brand); color:#fff; border-color:var(--c-brand); }
.pill:hover:not(.on) { background:var(--c-surface-3); color:var(--c-text); }
.fb-div { width:1px; height:18px; background:var(--c-border); }
.fb-sel { font-size:11px; padding:4px 8px 4px 10px; border:1px solid var(--c-border); border-radius:var(--r-md); background:var(--c-surface); color:var(--c-text-2); font-weight:600; cursor:pointer; }

.filter-chip {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px 4px 12px; border-radius:var(--r-full);
  background:var(--c-brand-soft); color:var(--c-brand);
  font-size:11px; font-weight:700;
  border:1px solid var(--c-brand); cursor:pointer;
  white-space:nowrap; transition:all var(--t-fast);
}
.filter-chip:hover { background:var(--c-brand); color:#fff; }
.filter-chip::after { content:'×'; font-size:14px; font-weight:800; opacity:.7; }

/* ── CONTENT ── */
.content { flex:1; position:relative; overflow:hidden; background:var(--c-bg); }
.panel { position:absolute; inset:0; overflow-y:auto; padding:18px 20px 28px; display:none; }
.panel.active { display:block; animation:fadeIn .25s ease; }
@keyframes fadeIn { from {opacity:0; transform:translateY(4px);} to {opacity:1; transform:translateY(0);} }

/* ── PANEL HEADERS ── */
.ph { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; gap:16px; flex-wrap:wrap; }
.pt { font-size:20px; font-weight:800; letter-spacing:-.03em; color:var(--c-text); }
.ps { font-size:12px; color:var(--c-text-3); margin-top:3px; font-weight:500; }
.pdr { display:flex; gap:6px; align-items:center; }

/* ── CARDS ── */
.card { background:var(--c-surface); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:14px 16px; box-shadow:var(--sh-1); transition:all var(--t-mid); }
.card-pad-lg { padding:18px 20px; }
.card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--c-text-3); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.card-title-lg { font-size:13px; font-weight:800; color:var(--c-text); letter-spacing:-.01em; }
.card-sub { font-size:11px; color:var(--c-text-3); font-weight:500; margin-top:2px; }
.card-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }

/* ── KPI ── */
.kpi { background:var(--c-surface); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:14px 16px; position:relative; overflow:hidden; box-shadow:var(--sh-1); transition:all var(--t-mid); }
.kpi:hover { box-shadow:var(--sh-3); border-color:var(--c-border-2); }
.kpi-lbl { font-size:10.5px; font-weight:700; color:var(--c-text-3); text-transform:uppercase; letter-spacing:.05em; }
.kpi-val { font-size:24px; font-weight:800; letter-spacing:-.035em; color:var(--c-text); margin-top:6px; font-variant-numeric:tabular-nums; }
.kpi-row { display:flex; justify-content:space-between; align-items:flex-end; margin-top:6px; }
.kpi-meta { font-size:11px; color:var(--c-text-3); font-weight:500; }
.kpi-delta { font-size:11px; font-weight:700; padding:2px 7px; border-radius:var(--r-full); }
.kpi-delta.up { background:var(--c-grn-bg); color:var(--c-grn); }
.kpi-delta.dn { background:var(--c-red-bg); color:var(--c-red); }
.kpi-delta.neu { background:var(--c-surface-3); color:var(--c-text-4); }
.kpi-spark { height:32px; margin-top:8px; opacity:.85; }
.kpi-accent { position:absolute; left:0; top:0; bottom:0; width:3px; }
.kpi-accent.brand { background:var(--c-brand); }
.kpi-accent.grn { background:var(--c-grn); }
.kpi-accent.amb { background:var(--c-amb); }
.kpi-accent.red { background:var(--c-red); }
.kpi-accent.pur { background:var(--c-pur); }
.kpi-accent.cyn { background:var(--c-cyn); }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:var(--r-md); font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all var(--t-fast); white-space:nowrap; }
.btn-primary { background:var(--c-brand); color:#fff; }
.btn-primary:hover { background:var(--c-brand-dim); }
.btn-ghost { background:transparent; color:var(--c-text-3); border:1px solid var(--c-border); }
.btn-ghost:hover { background:var(--c-surface-3); color:var(--c-text); }
.btn-sm { padding:4px 10px; font-size:11px; }

/* ── TABLES ── */
.tbl-wrap { overflow-x:auto; border-radius:var(--r-md); }
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl th { padding:9px 10px; text-align:left; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--c-text-4); border-bottom:2px solid var(--c-border); white-space:nowrap; background:var(--c-surface-2); position:sticky; top:0; }
.tbl th.num { text-align:right; }
.tbl th.sortable { cursor:pointer; user-select:none; padding-right:18px; position:relative; }
.tbl th.sortable:hover { color:var(--c-text); background:var(--c-surface); }
.tbl th.sortable::after { content:'⇅'; position:absolute; right:6px; top:50%; transform:translateY(-50%); opacity:.35; font-size:9px; font-weight:400; }
.tbl th.sortable.sort-asc::after { content:'▲'; opacity:1; color:var(--c-brand); }
.tbl th.sortable.sort-desc::after { content:'▼'; opacity:1; color:var(--c-brand); }
.tbl th[title] { text-decoration:underline; text-decoration-style:dotted; text-decoration-color:rgba(0,0,0,.25); text-decoration-thickness:1px; text-underline-offset:3px; cursor:help; }
.tbl th[title].sortable { cursor:pointer; }
.tbl th[title]:hover { text-decoration-color:var(--c-brand); }
.tbl td { padding:8px 10px; border-bottom:1px solid var(--c-border); color:var(--c-text-2); font-weight:500; white-space:nowrap; }
.tbl tbody tr:hover { background:var(--c-surface-2); }
.tbl td.num { text-align:right; font-variant-numeric:tabular-nums; font-weight:600; color:var(--c-text); }
.tbl td.lbl { font-weight:700; color:var(--c-text); }
.tbl tr.total td { font-weight:800; background:var(--c-surface-2); border-top:2px solid var(--c-border-2); color:var(--c-text); }
.tbl .ind { color:var(--c-grn); font-weight:700; }
.tbl .ind.bad { color:var(--c-red); }
.tbl .ind.warn { color:var(--c-amb); }
.tbl .ind.good { color:var(--c-grn); }

/* ── ALERTS ── */
.alert { display:flex; gap:10px; padding:11px 13px; border-radius:var(--r-md); font-size:12px; border:1px solid; align-items:flex-start; }
.alert.grn { background:var(--c-grn-bg); border-color:var(--c-grn-br); color:var(--c-grn-dk); }
.alert.red { background:var(--c-red-bg); border-color:var(--c-red-br); color:var(--c-red-dk); }
.alert.amb { background:var(--c-amb-bg); border-color:var(--c-amb-br); color:var(--c-amb-dk); }
.alert.blu { background:var(--c-brand-soft); border-color:#bfdbfe; color:#1e40af; }
[data-theme="dark"] .alert.blu { color:#93c5fd; }
.alert-icon { font-size:14px; flex-shrink:0; }

/* ── GRIDS ── */
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
.grid-6 { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
.grid-mix { display:grid; gap:14px; }
.gap-sm { gap:10px; }
.mb12 { margin-bottom:12px; }
.mb14 { margin-bottom:14px; }
.mb18 { margin-bottom:18px; }
.mt8 { margin-top:8px; }
.mt12 { margin-top:12px; }
.flex { display:flex; }
.gap6 { gap:6px; }
.gap10 { gap:10px; }
.gap14 { gap:14px; }
.ac { align-items:center; }
.jb { justify-content:space-between; }

/* ── CHART CANVAS ── */
.chart-box { position:relative; width:100%; }
.chart-box.h180 { height:180px; }
.chart-box.h220 { height:220px; }
.chart-box.h260 { height:260px; }
.chart-box.h300 { height:300px; }
.chart-box.h340 { height:340px; }

/* ── PROGRESS / PACING BARS ── */
.bar-row { display:grid; grid-template-columns:120px 1fr 70px; gap:10px; align-items:center; margin-bottom:8px; font-size:11.5px; }
.bar-lbl { font-weight:600; color:var(--c-text-2); }
.bar-track { height:8px; background:var(--c-surface-3); border-radius:var(--r-full); overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:var(--r-full); transition:width .5s ease; }
.bar-fill.brand { background:var(--c-brand); }
.bar-fill.grn { background:var(--c-grn); }
.bar-fill.amb { background:var(--c-amb); }
.bar-fill.red { background:var(--c-red); }
.bar-fill.pur { background:var(--c-pur); }
.bar-val { font-weight:700; text-align:right; font-variant-numeric:tabular-nums; }

/* ── FUNNEL ── */
.fn-row { margin-bottom:6px; }
.fn-bar { position:relative; height:38px; border-radius:var(--r-md); overflow:hidden; background:var(--c-surface-3); }
.fn-fill { height:100%; background:linear-gradient(90deg,var(--c-brand),#3b82f6); border-radius:var(--r-md); transition:width .5s ease; }
.fn-lbl { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#fff; font-size:12px; font-weight:700; z-index:1; }
.fn-val { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:#fff; font-size:13px; font-weight:800; font-variant-numeric:tabular-nums; z-index:1; }
.fn-cvr { font-size:10.5px; color:var(--c-text-3); padding:3px 12px 0; font-weight:600; text-align:right; }

/* ── PILLS / BADGES ── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:var(--r-full); font-size:10px; font-weight:700; }
.badge.grn { background:var(--c-grn-bg); color:var(--c-grn-dk); }
.badge.red { background:var(--c-red-bg); color:var(--c-red-dk); }
.badge.amb { background:var(--c-amb-bg); color:var(--c-amb-dk); }
.badge.blu { background:var(--c-brand-soft); color:var(--c-brand); }
.badge.pur { background:var(--c-pur-bg); color:var(--c-pur-dk); }
.badge.gry { background:var(--c-surface-3); color:var(--c-text-3); }
.badge.cyn { background:var(--c-cyn-bg); color:var(--c-cyn-dk); }

/* ── AI CHAT ── */
.ai-wrap { display:flex; flex-direction:column; height:calc(100vh - var(--topbar-h) - var(--filterbar-h) - 100px); max-width:920px; margin:0 auto; }
.ai-msgs { flex:1; overflow-y:auto; padding:6px 4px 14px; display:flex; flex-direction:column; gap:10px; }
.ai-msg { padding:11px 14px; border-radius:var(--r-lg); max-width:78%; font-size:13px; line-height:1.55; }
.ai-msg.bot { background:var(--c-surface); border:1px solid var(--c-border); align-self:flex-start; }

.tog { width:38px; height:22px; border-radius:11px; border:none; cursor:pointer; position:relative; transition:all var(--t-mid); }
.tog::after { content:''; position:absolute; top:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:all var(--t-mid); box-shadow:0 1px 2px rgba(0,0,0,.2); }
.tog.off { background:var(--c-border-2); }

<script>
(function(){
  var KEY = '3p_cc_unlocked_2026';
  var PWD = 'Reggie@2026';

  // Check if already unlocked this session
  if (sessionStorage.getItem(KEY) === '1') {
    document.getElementById('lock-overlay').style.display = 'none';
    return;
  }

  // Focus the input on load
  setTimeout(function(){
    var inp = document.getElementById('lock-pwd');
    if (inp) inp.focus();
  }, 100);

  window.__tryUnlock = function(){
    var inp = document.getElementById('lock-pwd');
    var err = document.getElementById('lock-err');
    if (inp.value === PWD) {
      sessionStorage.setItem(KEY, '1');
      document.getElementById('lock-overlay').style.display = 'none';
    } else {
      err.textContent = 'Incorrect access code. Please try again.';
      inp.value = '';
      inp.focus();
      // Subtle shake
      var card = err.parentElement;
      card.style.animation = 'none';
      setTimeout(function(){ card.style.animation = 'shake .35s'; }, 10);
    }
  };
})();
</script>

/* ═══════════════════════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════════════════════ */
function fmt$(n, dp){ dp = dp==null?0:dp; if(!isFinite(n)) return '—'; if(n>=1e6) return 'A$'+(n/1e6).toFixed(2)+'M'; if(n>=1e3) return 'A$'+(n/1e3).toFixed(dp)+'K'; return 'A$'+n.toFixed(dp); }
function fmt$exact(n){ if(!isFinite(n)) return '—'; return 'A$'+Math.round(n).toLocaleString(); }
function fmtN(n){ if(!isFinite(n)) return '—'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(0)+'K'; return Math.round(n).toLocaleString(); }
function fmtNexact(n){ if(!isFinite(n)) return '—'; return Math.round(n).toLocaleString(); }
function fmtPct(n, dp){ dp = dp==null?1:dp; if(!isFinite(n)) return '—'; return (n*100).toFixed(dp)+'%'; }
function fmtX(n){ if(!isFinite(n)) return '—'; return n.toFixed(1)+'×'; }
function fmtDecimal(n,dp){ dp=dp==null?2:dp; if(!isFinite(n)) return '—'; return n.toFixed(dp); }
function trend(arr){ if(arr.length<2) return 0; return (arr[arr.length-1]-arr[0])/Math.max(1,arr[0]); }
function sum(arr,k){ return arr.reduce(function(s,r){return s + (Number(r[k])||0)},0); }
function classDelta(d){ return d>0.005 ? 'up' : d<-0.005 ? 'dn' : 'neu'; }

/* ═══════════════════════════════════════════════════════════════════════════
   RENDER SIDEBAR + KPI STRIP
   ═══════════════════════════════════════════════════════════════════════════ */
function renderSidebar(){
  var html = '';
  NAV.forEach(function(sec){
    html += '<div class="sb-sec-lbl">'+sec.section+'</div>';
    sec.items.forEach(function(it){
      var badge = it.badge ? '<span class="sb-badge">'+it.badge+'</span>' : '';
      html += '<button class="sb-item" id="sb-'+it.id+'" data-nav="'+it.id+'" onclick="nav(\''+it.id+'\')">'+
        '<span class="sb-icon">'+it.icon+'</span><span style="flex:1">'+it.label+'</span>'+badge+'</button>';
    });
  });
  document.getElementById('sb-nav').innerHTML = html;
}

function renderKpiStrip(){
  var section = PANEL_TO_SECTION[CURRENT] || 'exec';
  var kpis = SECTION_KPIS[section] || [];
  var strip = document.getElementById('kpi-strip');
  if(kpis.length === 0){
    // Workspace — show just the section indicator
    strip.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--c-text-3);letter-spacing:.05em">WORKSPACE</div>';
    return;
  }
  // Render KPI tiles + a section indicator at the front
  var secMeta = NAV.find(function(s){return s.sectionId===section});
  var secLabel = secMeta ? secMeta.section : '';
  strip.innerHTML =
    '<div class="kpi-section-pill" data-section="'+section+'">'+secLabel+'</div>' +
    kpis.map(function(k){
      var v = k.fn();
      return '<div class="kpi-mini">'+
        '<span class="kpi-mini-lbl">'+k.lbl+'</span>'+
        '<span class="kpi-mini-val">'+v[0]+'</span>'+
        '<span class="kpi-mini-delta '+v[2]+'">'+v[1]+'</span>'+
      '</div>';
    }).join('');
}

function getCSSVar(name){

function lineChart(id, labels, datasets, opts){
  var ctx = document.getElementById(id); if(!ctx) return;
  var ex = Chart.getChart(ctx); if(ex) ex.destroy();
  return new Chart(ctx, {
    type:'line',
    data:{ labels:labels, datasets:datasets.map(function(d){ return Object.assign({fill:false,tension:.4,borderWidth:2.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:d.borderColor}, d); }) },
    options: Object.assign({
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ font:{size:11,weight:'600'}, color:getCSSVar('--c-text-3'), padding:14, boxWidth:10, usePointStyle:true } },
                tooltip:{ backgroundColor:'rgba(15,23,42,.95)', padding:10, cornerRadius:8, titleFont:{size:12,weight:'700'}, bodyFont:{size:11.5} } },
      scales:{
        x:{ grid:{ color:getCSSVar('--c-border'), drawBorder:false }, ticks:{ color:getCSSVar('--c-text-4'), font:{size:10.5,weight:'600'} } },
        y:{ grid:{ color:getCSSVar('--c-border'), drawBorder:false }, ticks:{ color:getCSSVar('--c-text-4'), font:{size:10.5,weight:'600'}, callback:function(v){ return v>=1000?(v/1000).toFixed(0)+'k':v; } } }
      }
    }, opts||{})
  });
}
function barChart(id, labels, datasets, opts){

  return new Chart(ctx, {
    type:'bar',
    data:{ labels:labels, datasets:datasets.map(function(d){ return Object.assign({borderRadius:5,borderSkipped:false,barPercentage:.78,categoryPercentage:.7}, d); }) },
    options: Object.assign({
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ font:{size:11,weight:'600'}, color:getCSSVar('--c-text-3'), padding:14, boxWidth:10, usePointStyle:true } },

function doughnut(id, labels, data, colors){

    type:'doughnut',

    options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',

/* ── SORTABLE TABLES ───────────────────────────────────────────────────────
   Parses cells smartly (handles A$, commas, %, ×, +/-) and toggles asc/desc.
   Auto-applied to every <table class="tbl"> after a panel renders.
   Total rows (.total) are pinned to the bottom regardless of sort. */
function parseSortValue(cell, isNum){
  if(!cell) return isNum ? -Infinity : '';
  var txt = (cell.innerText || cell.textContent || '').trim();
  if(!isNum) return txt.toLowerCase();
  if(txt === '—' || txt === '') return -Infinity;
  // Strip currency, commas, %, ×, leading + sign
  var clean = txt.replace(/A\$|US\$|\$|,|×|x|\+/g,'').replace(/%/g,'').trim();
  var n = parseFloat(clean);
  return isNaN(n) ? -Infinity : n;
}
function sortTable(table, colIdx, dir){
  var tbody = table.tBodies[0]; if(!tbody) return;
  // Three classes of rows:
  //   .total     → pinned to bottom (grand total)
  //   .subtotal  → hidden when sorted (tier subtotals lose meaning under arbitrary sort)
  //                shown when "unsorted" state (after a 3rd click, or initial load)
  //   everything else → data rows, sorted
  var rows = Array.prototype.slice.call(tbody.rows);
  var totalRows = rows.filter(function(r){ return r.classList.contains('total'); });
  var subtotalRows = rows.filter(function(r){ return r.classList.contains('subtotal'); });
  var dataRows  = rows.filter(function(r){ return !r.classList.contains('total') && !r.classList.contains('subtotal'); });
  // Determine if this column is numeric
  var headerCell = table.tHead ? table.tHead.rows[table.tHead.rows.length-1].cells[colIdx] : null;
  var firstCell = dataRows[0] ? dataRows[0].cells[colIdx] : null;
  var isNum = !!(firstCell && (firstCell.classList.contains('num') || (headerCell && headerCell.classList.contains('num'))));
  // Sort
  dataRows.sort(function(a, b){
    var av = parseSortValue(a.cells[colIdx], isNum);
    var bv = parseSortValue(b.cells[colIdx], isNum);
    if(av < bv) return dir === 'asc' ? -1 : 1;
    if(av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  // Hide subtotals during sort (they only make sense in their original grouping)
  subtotalRows.forEach(function(r){ r.style.display = 'none'; });
  // Re-attach: data rows first, then totals (subtotals stay in DOM but hidden)
  dataRows.concat(subtotalRows).concat(totalRows).forEach(function(r){ tbody.appendChild(r); });
}
function enhanceTable(table){
  if(table.__sortableEnhanced) return;
  table.__sortableEnhanced = true;
  // Use the LAST header row (handles multi-row headers like Source×Region)
  var thead = table.tHead;
  if(!thead || !thead.rows.length) return;
  var headerRow = thead.rows[thead.rows.length-1];
  var ths = Array.prototype.slice.call(headerRow.cells);
  // If multi-row header AND last row's first cell is empty, borrow from first row
  if(thead.rows.length > 1 && ths[0] && !(ths[0].innerText||'').trim()){
    var topRow = thead.rows[0];
    if(topRow.cells[0] && (topRow.cells[0].innerText||'').trim() && topRow.cells[0].colSpan <= 1){
      // Use the top row's first cell for column 0 instead
      ths[0] = topRow.cells[0];
    }
  }
  ths.forEach(function(th, idx){
    if(!th) return;
    if(th.hasAttribute && th.hasAttribute('data-nosort')) return;
    if(th.colSpan > 1) return;
    // Skip empty header cells
    if(!(th.innerText||th.textContent||'').trim()) return;
    th.classList.add('sortable');
    th.addEventListener('click', function(){
      var current = th.classList.contains('sort-asc') ? 'asc' : th.classList.contains('sort-desc') ? 'desc' : null;
      var newDir = current === 'desc' ? 'asc' : 'desc';
      ths.forEach(function(t){ if(t) t.classList.remove('sort-asc','sort-desc'); });
      th.classList.add(newDir === 'asc' ? 'sort-asc' : 'sort-desc');
      sortTable(table, idx, newDir);
    });
  });
}
function enhanceAllTables(root){
  var tables = (root || document).querySelectorAll('table.tbl');
  for(var i=0; i<tables.length; i++) enhanceTable(tables[i]);
}
// MutationObserver: when any panel's innerHTML changes, scan for new tables
if(typeof MutationObserver !== 'undefined'){
  var tableObserver = new MutationObserver(function(mutations){
    var anyNewTable = false;
    for(var i=0; i<mutations.length; i++){
      var added = mutations[i].addedNodes;
      for(var j=0; j<added.length; j++){
        var n = added[j];
        if(n.nodeType === 1 && (n.tagName === 'TABLE' || (n.querySelectorAll && n.querySelectorAll('table.tbl').length))){
          anyNewTable = true; break;
        }
      }
      if(anyNewTable) break;
    }
    if(anyNewTable) enhanceAllTables();
  });
  // Defer starting until DOM ready
  if(typeof document !== 'undefined' && document.body){
    tableObserver.observe(document.body, { childList:true, subtree:true });
  } else if(typeof document !== 'undefined'){
    document.addEventListener('DOMContentLoaded', function(){
      tableObserver.observe(document.body, { childList:true, subtree:true });
    });
  }
}

};

// ─────────────────────────────────── PLATFORM STRATEGY (combined web+app scale/kill view)
R.platforms = function(){
  var el = document.getElementById('p-platforms');
  var P = PLATFORM_UNIFIED.slice();

  // Decision logic: each platform gets a tier
  // - KILL: CPP > A$1000 OR I→S < 2% OR C/P > 1.5 (heavy bleed) OR ROAS < 0.05
  // - OPTIMISE: CPP > A$300 OR C/P > 1.0
  // - SCALE: CPP < A$100 AND C/P ≤ 0.95
  // - HOLD: everything else
  function tier(p){
    var cpp = p.cpp || 0;
    var cp = p.cp || 0;
    var roas = p.roas || 0;
    var i2s = p.install && p.paid ? p.paid/p.install : null;
    // Hard kill conditions
    if(p.paid === 0 || (cpp > 2000)) return {label:'KILL', color:'#dc2626', bg:'rgba(220,38,38,.12)', advice:'Stop spend — near-zero paid conversion'};
    if(cp && cp > 1.5) return {label:'KILL', color:'#dc2626', bg:'rgba(220,38,38,.12)', advice:'Heavy churn — losing more than acquired'};
    if(i2s !== null && i2s < 0.02 && cpp > 1000) return {label:'KILL', color:'#dc2626', bg:'rgba(220,38,38,.12)', advice:'Install→Sub <2% AND CPP >A$1000'};
    if(roas && roas < 0.05 && cpp > 500) return {label:'KILL', color:'#dc2626', bg:'rgba(220,38,38,.12)', advice:'ROAS <5% and CPP >A$500'};
    // Optimize conditions
    if(cpp > 300) return {label:'OPTIMISE', color:'#d97706', bg:'rgba(217,119,6,.12)', advice:'CPP elevated — audit creative/targeting'};
    if(cp && cp > 1.0) return {label:'OPTIMISE', color:'#d97706', bg:'rgba(217,119,6,.12)', advice:'Net negative subs — retention issue'};
    if(roas && roas < 0.20) return {label:'OPTIMISE', color:'#d97706', bg:'rgba(217,119,6,.12)', advice:'ROAS <20% — review unit economics'};
    // Scale conditions
    if(cpp > 0 && cpp <= 100 && (!cp || cp <= 0.95)) return {label:'SCALE', color:'#16a34a', bg:'rgba(22,163,74,.12)', advice:'Strong CPP + retention — invest more'};
    if(cpp > 0 && cpp <= 150 && !p.cp && i2s && i2s > 0.10) return {label:'SCALE', color:'#16a34a', bg:'rgba(22,163,74,.12)', advice:'Strong I→S conversion — invest more'};
    return {label:'HOLD', color:'#2563eb', bg:'rgba(37,99,235,.12)', advice:'Stable — maintain current spend'};
  }

  P.forEach(function(p){ p.tier = tier(p); });

  var totalSpend = P.reduce(function(s,p){return s+p.spend},0);
  var totalPaid = P.reduce(function(s,p){return s+(p.paid||0)},0);

  var h = '<div class="ph"><div><div class="pt">Platform Strategy <span style="background:#dcfce7;color:#166534;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.05em;margin-left:8px;vertical-align:middle">SCALE / HOLD / OPTIMISE / KILL</span></div>'+
    '<div class="ps">Combined web + app spend vs paid subs across all platforms · CPR / CPF / CPP / ROAS / C/P · FY26 YTD</div></div>'+
    '<div class="pdr"><span class="badge gry">Source: GMF channel tabs + CDE-011</span></div></div>';

  // Top callouts
  var killers = P.filter(function(p){return p.tier.label === 'KILL'});
  var scales  = P.filter(function(p){return p.tier.label === 'SCALE'});
  var killSpend = killers.reduce(function(s,p){return s+p.spend},0);
  var scaleSpend = scales.reduce(function(s,p){return s+p.spend},0);

  h += '<div class="alert red mb14"><span class="alert-icon">🚨</span><div>'+
    '<strong>'+killers.length+' platforms to KILL — A$'+fmtN(killSpend)+' of spend at risk.</strong> '+
    'These platforms produce near-zero subs, lose more than they acquire, or have ROAS below break-even. '+
    'Reallocate to the '+scales.length+' SCALE platforms (currently '+fmt$(scaleSpend)+' — has room to absorb significant additional spend).</div></div>';

  h += '<div class="grid-4 mb14">'+
    tile('Total Platform Spend', fmt$(totalSpend), 'Across web + app (FY26 YTD)', 'neu') +
    tile('Total Paid Subs', fmtNexact(totalPaid), 'From these platforms', 'neu') +
    tile('Blended CPP', 'A$'+Math.round(totalSpend/totalPaid).toLocaleString(), 'Weighted across all', 'neu') +
    tile('Spend in KILL tier', fmt$(killSpend), (killSpend/totalSpend*100).toFixed(0)+'% of total spend', 'dn') +
  '</div>';

  // Action matrix: 4 tier cards
  var TIERS = ['SCALE','HOLD','OPTIMISE','KILL'];
  var tierColors = {
    'SCALE':    {color:'#16a34a', bg:'rgba(22,163,74,.10)', icon:'⬆'},
    'HOLD':     {color:'#2563eb', bg:'rgba(37,99,235,.10)', icon:'■'},
    'OPTIMISE': {color:'#d97706', bg:'rgba(217,119,6,.10)', icon:'⚙'},
    'KILL':     {color:'#dc2626', bg:'rgba(220,38,38,.10)', icon:'✕'},
  };

  h += '<div class="card card-pad-lg mb14">'+
    '<div class="card-title-lg mb12">Action Matrix</div>'+
    '<div class="grid-4">'+
      TIERS.map(function(tn){
        var plats = P.filter(function(p){return p.tier.label === tn}).sort(function(a,b){return b.spend-a.spend});
        var t = tierColors[tn];
        var tierSpend = plats.reduce(function(s,p){return s+p.spend},0);
        return '<div style="border:2px solid '+t.color+';border-radius:10px;padding:14px;background:'+t.bg+'">'+
          '<div style="font-size:18px;font-weight:800;color:'+t.color+';margin-bottom:4px">'+t.icon+' '+tn+' <span style="font-size:14px;opacity:0.7">('+plats.length+')</span></div>'+
          '<div class="card-sub mb8" style="font-size:11px">'+fmt$(tierSpend)+' spend ('+(totalSpend?(tierSpend/totalSpend*100).toFixed(0):'0')+'%)</div>'+
          (plats.length ? '<div>'+plats.map(function(p){
            return '<div style="padding:6px 0;border-top:1px solid rgba(0,0,0,.06);font-size:12px">'+
              '<div style="font-weight:700">'+p.name+'</div>'+
              '<div class="card-sub" style="font-size:11px">'+fmt$(p.spend)+' · '+(p.paid?fmtNexact(p.paid)+' subs':'0 subs')+(p.cpp?' · A$'+Math.round(p.cpp)+' CPP':'')+'</div>'+
            '</div>';
          }).join('')+'</div>' : '<div class="card-sub" style="font-size:11px">— none —</div>')+
        '</div>';
      }).join('')+
    '</div>'+
  '</div>';

  // Detailed table
  // Group rows by tier (sorted SCALE → HOLD → OPTIMISE → KILL), with subtotal rows after each group
  var TIER_ORDER = ['SCALE','HOLD','OPTIMISE','KILL'];
  var tierColors2 = {
    'SCALE':    {color:'#16a34a', bg:'rgba(22,163,74,.12)'},
    'HOLD':     {color:'#2563eb', bg:'rgba(37,99,235,.12)'},
    'OPTIMISE': {color:'#d97706', bg:'rgba(217,119,6,.12)'},
    'KILL':     {color:'#dc2626', bg:'rgba(220,38,38,.12)'},
  };

  // Helper: aggregate a set of platforms into a single row of totals
  function aggregate(arr){
    var a = {spend:0, reg:0, wfs:0, paid:0, install:0, rev:0, cancel:0, has_reg:false, has_wfs:false, has_paid:false, has_install:false, has_rev:false, has_cancel:false};
    arr.forEach(function(p){
      a.spend += p.spend;
      if(p.reg){ a.reg += p.reg; a.has_reg = true; }
      if(p.wfs){ a.wfs += p.wfs; a.has_wfs = true; }
      if(p.paid){ a.paid += p.paid; a.has_paid = true; }
      if(p.install){ a.install += p.install; a.has_install = true; }
      if(p.rev){ a.rev += p.rev; a.has_rev = true; }
      if(p.cancel){ a.cancel += p.cancel; a.has_cancel = true; }
    });
    a.cpr = a.has_reg && a.reg ? a.spend/a.reg : null;
    a.cpf = a.has_wfs && a.wfs ? a.spend/a.wfs : null;
    a.cpp = a.has_paid && a.paid ? a.spend/a.paid : null;
    a.i2s = a.has_install && a.install && a.has_paid ? a.paid/a.install : null;
    a.cp  = a.has_cancel && a.has_paid && a.paid ? a.cancel/a.paid : null;
    a.roas = a.has_rev && a.spend ? a.rev/a.spend : null;
    return a;
  }

  h += '<div class="card card-pad-lg">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<div class="card-title-lg" style="margin:0">Platform Detail</div>'+
      '<span class="card-sub" style="font-weight:400;flex:1">Grouped by Action tier · hover any column header for definition · click to sort</span>'+
      '<button id="platReset" style="padding:6px 10px;border:1px solid var(--bdr);background:white;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600">Reset sort</button>'+
    '</div>'+
    '<div style="overflow-x:auto"><table class="tbl" id="platTbl">'+
      '<thead><tr>'+
        '<th title="Paid advertising platform — combines web and app channels under each brand (e.g. Google Ads (Web) vs Google Ads (iOS))">Platform</th>'+
        '<th title="Operating system: Web (browser-based signups), iOS (Apple App Store), Android (Google Play). Each OS has a different funnel — Web goes spend→reg→trial→paid; App goes spend→install→reg→trial→paid">OS</th>'+
        '<th class="num" title="Total media spend in AUD across all regions for this platform — FY26 YTD. Excludes agency fees, brand, PR, and non-channel marketing.">Spend</th>'+
        '<th class="num" title="App installs only — the number of times the app was downloaded from the App Store or Google Play. App platforms only. Web platforms show — because there is no install step on web.">Installs</th>'+
        '<th class="num" title="Web registrations — the number of people who created a Reading Eggs / Mathseeds account via the website. Web platforms only (from CDE-011 grouped by code prefix). App platforms show — because in-app registration is not tracked per acquisition channel.">Reg</th>'+
        '<th class="num" title="Free trial activations — people who registered AND started the 30-day free trial. Web only; app platforms show — because trial starts happen in-app and are not tied back to acquisition channel in this workbook.">Trial</th>'+
        '<th class="num" title="Paid subscribers — people who converted to a paying customer (yearly or monthly subscription). The end goal of every funnel and the most directly comparable metric across web and app.">Paid</th>'+
        '<th class="num" title="Cost Per Registration = Spend ÷ Reg. Lower is better. Web platforms only. Apple Search Ads / Google Ads iOS / etc. show — because we cannot attribute registrations back to app channels.">CPR</th>'+
        '<th class="num" title="Cost Per Free Trial = Spend ÷ Trial. Lower is better. Web platforms only. Tells you how much it costs to get someone past the free-trial activation step.">CPF</th>'+
        '<th class="num" title="Cost Per Paid subscriber = Spend ÷ Paid. The bottom-line efficiency metric — how much does it cost to acquire one paying customer. Green when ≤A$100, red when >A$500. Comparable across web and app.">CPP</th>'+
        '<th class="num" title="Install→Subscribe conversion rate = Paid ÷ Installs. App platforms only. What % of people who download the app go on to subscribe. Higher is better. 10%+ is excellent, <2% is a kill signal.">I→S %</th>'+
        '<th class="num" title="Cancel-to-Paid ratio = Cancels ÷ Paid. Web only. >1.0× means more people are cancelling than this channel is acquiring (channel is net-negative). Red when >1.0×.">C/P</th>'+
        '<th class="num" title="Return on Ad Spend = Revenue ÷ Spend. Web only (we don\'t have per-channel app revenue). >0.5× is healthy, <0.2× signals weak unit economics. Note: this is short-term revenue only and excludes lifetime value from renewals.">ROAS</th>'+
        '<th title="Recommended action based on the decision rules. SCALE (green) = invest more. HOLD (blue) = maintain. OPTIMISE (amber) = audit before increasing spend. KILL (red) = stop spend and reallocate. Hover individual cells for the specific reason.">Action</th>'+
      '</tr></thead>'+
      '<tbody>'+
      // Emit rows by tier, with a subtotal row after each tier's platforms
      TIER_ORDER.map(function(tn){
        var plats = P.filter(function(p){return p.tier.label === tn}).sort(function(a,b){return b.spend-a.spend});
        if(!plats.length) return '';
        var t = tierColors2[tn];
        // Individual platform rows
        var rows = plats.map(function(p){
          var i2s = p.install && p.paid ? p.paid/p.install : null;
          return '<tr>'+
            '<td style="font-weight:600">'+p.name+'</td>'+
            '<td>'+p.os+'</td>'+
            '<td class="num">'+fmt$exact(p.spend)+'</td>'+
            '<td class="num">'+(p.install?fmtNexact(p.install):'—')+'</td>'+
            '<td class="num">'+(p.reg?fmtNexact(p.reg):'—')+'</td>'+
            '<td class="num">'+(p.wfs?fmtNexact(p.wfs):'—')+'</td>'+
            '<td class="num">'+(p.paid?fmtNexact(p.paid):'0')+'</td>'+
            '<td class="num">'+(p.cpr?'A$'+Math.round(p.cpr).toLocaleString():'—')+'</td>'+
            '<td class="num">'+(p.cpf?'A$'+Math.round(p.cpf).toLocaleString():'—')+'</td>'+
            '<td class="num" style="font-weight:700;'+(p.cpp && p.cpp>500?'color:#dc2626':(p.cpp && p.cpp<100?'color:#16a34a':''))+'">'+(p.cpp?'A$'+Math.round(p.cpp).toLocaleString():'—')+'</td>'+
            '<td class="num">'+(i2s!==null?fmtPct(i2s,2):'—')+'</td>'+
            '<td class="num" style="'+(p.cp && p.cp>1.0?'color:#dc2626;font-weight:700':'')+'">'+(p.cp?p.cp.toFixed(2)+'×':'—')+'</td>'+
            '<td class="num" style="'+(p.roas && p.roas<0.20?'color:#dc2626':(p.roas && p.roas>0.50?'color:#16a34a':''))+'">'+(p.roas?p.roas.toFixed(2)+'×':'—')+'</td>'+
            '<td><span style="background:'+p.tier.bg+';color:'+p.tier.color+';font-weight:700;font-size:11px;padding:3px 8px;border-radius:4px;letter-spacing:.04em">'+p.tier.label+'</span><div class="card-sub" style="font-size:10px;margin-top:3px">'+p.tier.advice+'</div></td>'+
          '</tr>';
        }).join('');
        // Subtotal row for this tier
        var ag = aggregate(plats);
        var sub = '<tr class="subtotal" style="background:'+t.bg+';font-weight:700;border-top:2px solid '+t.color+'">'+
          '<td style="color:'+t.color+'">↳ '+tn+' subtotal</td>'+
          '<td class="num" style="color:'+t.color+'">'+plats.length+' platform'+(plats.length>1?'s':'')+'</td>'+
          '<td class="num">'+fmt$exact(ag.spend)+'</td>'+
          '<td class="num">'+(ag.has_install?fmtNexact(ag.install):'—')+'</td>'+
          '<td class="num">'+(ag.has_reg?fmtNexact(ag.reg):'—')+'</td>'+
          '<td class="num">'+(ag.has_wfs?fmtNexact(ag.wfs):'—')+'</td>'+
          '<td class="num">'+(ag.has_paid?fmtNexact(ag.paid):'0')+'</td>'+
          '<td class="num">'+(ag.cpr?'A$'+Math.round(ag.cpr).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.cpf?'A$'+Math.round(ag.cpf).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.cpp?'A$'+Math.round(ag.cpp).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.i2s!==null?fmtPct(ag.i2s,2):'—')+'</td>'+
          '<td class="num">'+(ag.cp?ag.cp.toFixed(2)+'×':'—')+'</td>'+
          '<td class="num">'+(ag.roas?ag.roas.toFixed(2)+'×':'—')+'</td>'+
          '<td></td>'+
        '</tr>';
        return rows + sub;
      }).join('')+
      // ALL TIERS row — explicitly sums SCALE + HOLD + OPTIMISE + KILL subtotals

          '<td class="num">'+fmt$exact(ag.spend)+'</td>'+
          '<td class="num">'+(ag.has_install?fmtNexact(ag.install):'—')+'</td>'+
          '<td class="num">'+(ag.has_reg?fmtNexact(ag.reg):'—')+'</td>'+
          '<td class="num">'+(ag.has_wfs?fmtNexact(ag.wfs):'—')+'</td>'+
          '<td class="num">'+(ag.has_paid?fmtNexact(ag.paid):'0')+'</td>'+
          '<td class="num">'+(ag.cpr?'A$'+Math.round(ag.cpr).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.cpf?'A$'+Math.round(ag.cpf).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.cpp?'A$'+Math.round(ag.cpp).toLocaleString():'—')+'</td>'+
          '<td class="num">'+(ag.i2s!==null?fmtPct(ag.i2s,2):'—')+'</td>'+
          '<td class="num">'+(ag.cp?ag.cp.toFixed(2)+'×':'—')+'</td>'+
          '<td class="num">'+(ag.roas?ag.roas.toFixed(2)+'×':'—')+'</td>'+
          '<td></td>'+
        '</tr>';
      })()+
      // Grand total row — class="total" so it pins to bottom on column sort
      (function(){
        var ag = aggregate(P);
        return '<tr class="total" style="background:#0f172a;color:white;font-weight:700;border-top:3px solid #0f172a">'+
          '<td style="color:white">▣ GRAND TOTAL</td>'+
          '<td class="num" style="color:white">'+P.length+' platforms</td>'+
          '<td class="num" style="color:white">'+fmt$exact(ag.spend)+'</td>'+
          '<td class="num" style="color:white">'+(ag.has_install?fmtNexact(ag.install):'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.has_reg?fmtNexact(ag.reg):'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.has_wfs?fmtNexact(ag.wfs):'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.has_paid?fmtNexact(ag.paid):'0')+'</td>'+
          '<td class="num" style="color:white">'+(ag.cpr?'A$'+Math.round(ag.cpr).toLocaleString():'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.cpf?'A$'+Math.round(ag.cpf).toLocaleString():'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.cpp?'A$'+Math.round(ag.cpp).toLocaleString():'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.i2s!==null?fmtPct(ag.i2s,2):'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.cp?ag.cp.toFixed(2)+'×':'—')+'</td>'+
          '<td class="num" style="color:white">'+(ag.roas?ag.roas.toFixed(2)+'×':'—')+'</td>'+
          '<td></td>'+
        '</tr>';
      })()+
      '</tbody>'+
    '</table></div>'+
  '</div>';

  // Notes
  h += '<div class="card card-pad-lg" style="margin-top:14px">'+
    '<div class="card-title mb8">Methodology &amp; Caveats</div>'+
    '<div class="card-sub" style="font-size:12px;line-height:1.6">'+
    '<strong>Web spend</strong> derived from channel-tab campaign-month rollups (quarterly + FY26 rollups excluded to avoid double-counting). Total tied: A$4.18M of A$6.45M web spend — the gap is non-platform expenses (Online/Rokt, agency, brand, PR).<br>'+
    '<strong>Web reg/paid/rev</strong> from CDE-011 grouped by code prefix: ADW=Google Ads, FCB=Meta, BNG=Bing (incl CTV), TIK=TikTok. Reddit codes don\'t link cleanly.<br>'+
    '<strong>App data</strong> direct from APP_CHANNELS (Apple Search Ads, Google Ads, Meta, TikTok by OS). App platforms show <strong>Installs</strong> (top-of-funnel for apps); they don\'t track Reg per channel since registration happens inside the app post-install. Of 713K app installs only ~292K became registrations globally (iOS 152K + Android 140K) — most installs never register, which is why mixing installs and reg in one column gave a misleading "831K" total earlier.<br>'+
    '<strong>Web data</strong> shows <strong>Reg</strong> (top-of-funnel for web — no install step). Web reg shown here (118K) is the paid-channel subset of total web reg (256,712); the gap is organic + non-coded web traffic.<br>'+
    '<strong>App C/P + ROAS</strong> show "—" because cancellations and revenue per app channel live in Chargebee/AppsFlyer, not this workbook.<br>'+
    '<strong>Decision rules:</strong> KILL = CPP &gt; A$2000, OR C/P &gt; 1.5, OR (I→S &lt; 2% AND CPP &gt; A$1000), OR (ROAS &lt; 5% AND CPP &gt; A$500). OPTIMISE = CPP &gt; A$300 OR C/P &gt; 1.0 OR ROAS &lt; 20%. SCALE = CPP ≤ A$100 AND C/P ≤ 0.95, OR strong I→S (&gt;10%) with CPP ≤ A$150.'+
    '</div>'+

  }
};

// ─────────────────────────────────── CHANNELS
R.channels = function(){

  // Each family is one row in the report. Not grouped by prefix.

  var totFree = sum(CH,'free');
  var totPaid = sum(CH,'paid');
  var totCancel = sum(CH,'cancel');
  var totRev = sum(CH,'rev');
  var totCodes = sum(CH,'codes');
  var totNet = totPaid - totCancel;

  var h = '<div class="ph"><div><div class="pt">Channels · Per-Campaign Detail <span style="background:#fee2e2;color:#991b1b;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.05em;margin-left:8px;vertical-align:middle">WEB ONLY</span></div><div class="ps">Every campaign family from CDE-010 lifetime · Web registrations only (signup codes don\'t exist for iOS/Android app registrations)</div></div>'+
    '<div class="pdr"><span class="badge gry">Source: GMF CDE-010 (CR.Code Template field)</span></div></div>';

  // Top leakers
  var biggestLeaker = CH.slice().sort(function(a,b){return (a.paid-a.cancel)-(b.paid-b.cancel)})[0];
  var biggestGain = CH.slice().sort(function(a,b){return (b.paid-b.cancel)-(a.paid-a.cancel)})[0];

      '<div class="card-title-lg mb12">Worst 20 Cancel/Paid Ratios</div>'+
      '<div class="card-sub mb12">Ratio &gt;1.0× means losing more than acquiring. Sorted from worst.</div>'+
      '<div class="chart-box h500"><canvas id="ch-ch-cancel"></canvas></div>'+
    '</div>'+
  '</div>';

  // Full table — every family
  h += '<div class="card card-pad-lg">'+

      '<tbody>'+

          var net = c.paid - c.cancel;
          var paidClass = c.paid_pct>=0.40 ? 'good' : c.paid_pct>=0.25 ? '' : c.paid_pct>=0.15 ? 'warn' : 'bad';

          var netClass = net>=0 ? 'good' : 'bad';
          return '<tr><td class="lbl" style="font-size:11.5px">'+c.family+'</td>'+

            '<td class="num">'+fmtNexact(c.reg)+'</td>'+
            '<td class="num">'+fmtNexact(c.free)+'</td>'+
            '<td class="num">'+fmtNexact(c.paid)+'</td>'+
            '<td class="num">'+fmtNexact(c.cancel)+'</td>'+

          '<td class="num">'+fmtPct(totFree/totReg,1)+'</td>'+
          '<td class="num">'+fmtPct(totPaid/totReg,1)+'</td>'+
          '<td class="num">A$'+(totPaid?(totRev/totPaid).toFixed(0):'0')+'</td>'+
          '<td class="num">'+(totCancel/totPaid).toFixed(2)+'×</td>'+

  el.innerHTML = h;

  var sorted_net = CH.slice().sort(function(a,b){return (a.paid-a.cancel)-(b.paid-b.cancel)});

  barChart('ch-ch-net', top20.map(function(c){return c.family.length>40?c.family.substr(0,40)+'…':c.family}), [

  ], { indexAxis:'y', plugins:{legend:{display:false}} });

  // Worst 20 cancel/paid ratios (only those with paid>=20)
  var byRatio = CH.filter(function(c){return c.paid>=20}).slice().sort(function(a,b){return b.cancel_ratio-a.cancel_ratio}).slice(0,20);
  barChart('ch-ch-cancel', byRatio.map(function(c){return c.family.length>40?c.family.substr(0,40)+'…':c.family}), [

  ], { indexAxis:'y', plugins:{legend:{display:false}} });
};

// ─────────────────────────────────── ZOHO FUNNEL
R.funnel = function(){
  var el = document.getElementById('p-funnel');

  // ──────────────────────────────────────────────────────────────────
  // TWO INDEPENDENT FUNNELS — never blended:
  // (1) Global Snapshot: 548,896 reg → 272,731 free sub. Every reg in the system.
  // (2) CDE-011 attributed: 245,668 reg → 104,939 trial → 58,288 paid. Only regs with signup code.
  // The 55% gap = unattributed regs.
  // ──────────────────────────────────────────────────────────────────

  // Apply filters: slice by period and scale by region/os/product
  var slice = periodSlice();
  var m = filterMult();
  var GLOBAL_MO_F = GLOBAL_MO.slice(slice[0], slice[1]).map(function(r){
    return { m:r.m, reg: Math.round(r.reg*m), free: Math.round(r.free*m), spend: Math.round(r.spend*m) };
  });
  var SIGNUP_MO_F = SIGNUP_MO.slice(slice[0], slice[1]).map(function(r){
    return {
      m: r.m,
      reg:    Math.round(r.reg    * m),
      trial:  Math.round(r.trial  * m),
      paid:   Math.round(r.paid   * m),
      cancel: Math.round(r.cancel * m),
      rev:    Math.round(r.rev    * m),
      free_paid_cr: r.free_paid_cr,
    };
  });

  // Global Snapshot — real totals (filtered)
  var gsReg = sum(GLOBAL_MO_F, 'reg');
  var gsFree = sum(GLOBAL_MO_F, 'free');

  // CDE-011 — real attributed funnel (filtered)
  var cdeReg    = sum(SIGNUP_MO_F, 'reg');
  var cdeTrial  = sum(SIGNUP_MO_F, 'trial');
  var cdePaid   = sum(SIGNUP_MO_F, 'paid');
  var cdeCancel = sum(SIGNUP_MO_F, 'cancel');
  var cdeRev    = sum(SIGNUP_MO_F, 'rev');

  var attributedPct = gsReg ? cdeReg / gsReg : 0;
  var trialPct = cdeReg ? cdeTrial / cdeReg : 0;
  var paidPct = cdeReg ? cdePaid / cdeReg : 0;
  var trialToPaid = cdeTrial ? cdePaid / cdeTrial : 0;

      '<div class="card-title-lg mb12">Cost per Free Trial Sub</div>'+
      '<div class="card-sub mb12">Lower = cheaper to acquire a trial. Capped at A$500 for readability.</div>'+
      '<div class="chart-box h300"><canvas id="ch-app-cps"></canvas></div>'+
    '</div>'+
  '</div>';

  // Full channel table
  h += '<div class="card card-pad-lg mb14">'+
    '<div class="card-title-lg mb12">Full App Channel Detail</div>'+
    '<div class="card-sub mb12">Ranked by spend. Cost per Sub = total spend ÷ free trial subs. Yearly Rev = annual subscription revenue only (not monthly).</div>'+
    '<div class="tbl-wrap"><table class="tbl">'+
      '<thead><tr><th>Channel</th><th>OS</th><th class="num">Tabs</th><th class="num">Spend</th><th class="num">Installs</th><th class="num">Free Trial</th><th class="num">Install→Sub</th><th class="num">Yearly Pur.</th><th class="num">Yearly Rev</th><th class="num">CPI</th><th class="num">CPSub</th></tr></thead>'+
      '<tbody>'+

          var cpsCls = c.cps <= 100 ? 'good' : c.cps <= 200 ? '' : c.cps <= 500 ? 'warn' : 'bad';
          var osIcon = c.os === 'iOS' ? '🍎' : '🤖';
          return '<tr><td class="lbl"><strong>'+c.channel+'</strong></td>'+
            '<td>'+osIcon+' '+c.os+'</td>'+
            '<td class="num">'+c.tabs+'</td>'+
            '<td class="num">'+fmt$exact(c.spend)+'</td>'+
            '<td class="num">'+fmtNexact(c.install)+'</td>'+
            '<td class="num">'+fmtNexact(c.subscribe)+'</td>'+
            '<td class="num"><span class="ind '+i2sCls+'">'+fmtPct(c.i2s,1)+'</span></td>'+
            '<td class="num">'+fmtNexact(c.yearly_pur)+'</td>'+
            '<td class="num">'+fmt$exact(c.yearly_rev)+'</td>'+
            '<td class="num">A$'+c.cpi.toFixed(2)+'</td>'+
            '<td class="num"><span class="ind '+cpsCls+'">'+(c.subscribe?'A$'+c.cps.toFixed(0):'—')+'</span></td>'+
          '</tr>';
        }).join('')+
        (function(){
          var i2s = totInstall ? totSub/totInstall : 0;
          var cpi = totInstall ? totSpend/totInstall : 0;
          var cps = totSub ? totSpend/totSub : 0;
          return '<tr class="total"><td><strong>TOTAL</strong></td><td></td><td class="num">37</td>'+
            '<td class="num">'+fmt$exact(totSpend)+'</td>'+
            '<td class="num">'+fmtNexact(totInstall)+'</td>'+
            '<td class="num">'+fmtNexact(totSub)+'</td>'+
            '<td class="num"><strong>'+fmtPct(i2s,1)+'</strong></td>'+
            '<td class="num">'+fmtNexact(totPur)+'</td>'+
            '<td class="num">'+fmt$exact(totRev)+'</td>'+
            '<td class="num">A$'+cpi.toFixed(2)+'</td>'+
            '<td class="num"><strong>A$'+cps.toFixed(0)+'</strong></td>'+
          '</tr>';
        })()+
      '</tbody>'+
    '</table></div>'+
  '</div>';

  // Region × Channel cross-tab (only meaningful for high-spend channels)
  var bigChannels = CHS.filter(function(c){return c.spend >= 50000});
  h += '<div class="card card-pad-lg">'+
    '<div class="card-title-lg mb12">Channel × Region · App Spend Detail</div>'+
    '<div class="card-sub mb12">Top channels (spend &gt; A$50K) split by region. Shows where each channel concentrates.</div>'+
    '<div class="tbl-wrap"><table class="tbl">'+
      '<thead><tr><th>Channel</th>'+
        '<th class="num" colspan="3" style="text-align:center;background:rgba(22,163,74,.10)">🇺🇸 AMER</th>'+
        '<th class="num" colspan="3" style="text-align:center;background:rgba(37,99,235,.10)">🇦🇺 APAC</th>'+
        '<th class="num" colspan="3" style="text-align:center;background:rgba(124,58,237,.10)">🇬🇧 EMEA</th>'+
      '</tr><tr><th></th>'+
        '<th class="num">Spend</th><th class="num">Sub</th><th class="num">CPSub</th>'+
        '<th class="num">Spend</th><th class="num">Sub</th><th class="num">CPSub</th>'+
        '<th class="num">Spend</th><th class="num">Sub</th><th class="num">CPSub</th>'+
      '</tr></thead>'+
      '<tbody>'+
        bigChannels.map(function(c){
          var rgd = c.by_region || {};
          function cell(d){
            if(!d || !d.spend) return '<td class="num">—</td><td class="num">—</td><td class="num">—</td>';
            var cps = d.subscribe ? d.spend/d.subscribe : 0;
            var cpsCls = cps && cps <= 100 ? 'good' : cps <= 200 ? '' : cps <= 500 ? 'warn' : 'bad';
            return '<td class="num">'+fmt$exact(d.spend)+'</td>'+
                   '<td class="num">'+fmtNexact(d.subscribe || 0)+'</td>'+
                   '<td class="num"><span class="ind '+cpsCls+'">'+(d.subscribe?'A$'+cps.toFixed(0):'—')+'</span></td>';
          }
          var osIcon = c.os === 'iOS' ? '🍎' : '🤖';
          return '<tr><td class="lbl"><strong>'+c.channel+' '+osIcon+' '+c.os+'</strong></td>'+
            cell(rgd.AMER)+cell(rgd.APAC)+cell(rgd.EMEA)+
          '</tr>';
        }).join('')+
      '</tbody>'+
    '</table></div>'+
  '</div>';

  el.innerHTML = h;

  // Charts
  barChart('ch-app-spend', CHS.map(function(c){return c.channel+' '+c.os}), [
    { label:'Spend (A$)', data: CHS.map(function(c){return c.spend}), backgroundColor: CHS.map(function(c){return c.os==='iOS'?'#16a34a':'#f59e0b'}) }
  ], { indexAxis:'y', plugins:{legend:{display:false}} });

  barChart('ch-app-subs', CHS.map(function(c){return c.channel+' '+c.os}), [
    { label:'Free Trial Subs', data: CHS.map(function(c){return c.subscribe}), backgroundColor: CHS.map(function(c){return c.os==='iOS'?'#16a34a':'#f59e0b'}) }
  ], { indexAxis:'y', plugins:{legend:{display:false}} });

  barChart('ch-app-i2s', CHS.map(function(c){return c.channel+' '+c.os}), [
    { label:'Install→Sub %', data: CHS.map(function(c){return c.i2s*100}), backgroundColor: CHS.map(function(c){return c.i2s>=0.10?'#16a34a':c.i2s>=0.05?'#2563eb':'#dc2626'}) }
  ], { indexAxis:'y', plugins:{legend:{display:false}} });

  var cpsData = CHS.map(function(c){return Math.min(c.cps, 500)}); // cap for readability
  barChart('ch-app-cps', CHS.map(function(c){return c.channel+' '+c.os}), [
    { label:'Cost per Sub (A$)', data: cpsData, backgroundColor: CHS.map(function(c){return c.cps<=100?'#16a34a':c.cps<=200?'#2563eb':c.cps<=500?'#d97706':'#dc2626'}) }
  ], { indexAxis:'y', plugins:{legend:{display:false}} });
};

// ─────────────────────────────────── SIGNUP CODE FUNNEL
R.signupcodes = function(){
  var el = document.getElementById('p-signupcodes');
  // Use the 64 individual campaign families from CDE-010 (uncombined, no prefix grouping)
  var CHS = SIGNUP_CHANNELS_FULL.slice().sort(function(a,b){return b.paid_pct-a.paid_pct});
  var totalReg = sum(CHS,'reg');
  var totalPaid = sum(CHS,'paid');
  var totalCancel = sum(CHS,'cancel');
  var totalRev = sum(CHS,'rev');
  var totalCodes = sum(CHS,'codes');
  var avgPaidPct = totalReg ? totalPaid/totalReg : 0;
  var avgTrialPct = totalReg ? sum(CHS,'free')/totalReg : 0;

  // Action classification — uses BOTH Reg→Paid % AND Cancel/Paid ratio
  // because a high-conversion campaign that bleeds subs (Rokt: 19.4% R→P, 2.10× C/P) is NOT a SCALE candidate
  function actionTier(c){
    var cp = c.cancel_ratio;
    var pp = c.paid_pct;
    // PAUSE: bleeds subs heavily (C/P > 1.5)
    if(cp > 1.5) return {label:'PAUSE',   color:'#dc2626', bg:'rgba(220,38,38,.15)', advice:'Heavy churn — losing far more than acquired'};
    // SCALE: good R→P AND not losing more than acquired (C/P ≤ 1.0)
    if(pp >= 0.30 && cp <= 1.00) return {label:'SCALE',    color:'#16a34a', bg:'rgba(22,163,74,.15)', advice:'Strong conversion + retains subs — invest more'};
    // OPTIMISE: bleeds moderately (C/P 1.0-1.5) OR poor R→P (<15%)
    if(cp > 1.0 || pp < 0.15) return {label:'OPTIMISE', color:'#d97706', bg:'rgba(217,119,6,.15)', advice:'Audit churn / quality issues'};
    // HOLD: everything else
    return {label:'HOLD',     color:'#2563eb', bg:'rgba(37,99,235,.15)', advice:'Stable — maintain current spend'};
  }

  var h = '<div class="ph"><div><div class="pt">Signup Code Funnel <span style="background:#fee2e2;color:#991b1b;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.05em;margin-left:8px;vertical-align:middle">WEB ONLY</span></div><div class="ps">Every campaign family\'s Reg → Free/Trial → Paid quality + retention · Web registrations only (iOS/Android app users don\'t use signup codes)</div></div>'+
    '<div class="pdr"><span class="badge gry">Source: GMF CDE-010 (CR.Code Template, uncombined)</span></div></div>';

  // Headline
  var bestCh = CHS.filter(function(c){return c.paid>=50})[0]; // high quality requires meaningful volume
  var worstCh = CHS.filter(function(c){return c.paid>=50}).slice(-1)[0];
  h += '<div class="alert red mb14"><span class="alert-icon">🚨</span><div><strong>Reg→Paid varies '+((bestCh.paid_pct/Math.max(worstCh.paid_pct,0.001)).toFixed(0))+'× across families with meaningful volume.</strong> '+
    '<strong>'+bestCh.family+'</strong> converts '+fmtPct(bestCh.paid_pct,1)+' of regs to paid; '+
    '<strong>'+worstCh.family+'</strong> only '+fmtPct(worstCh.paid_pct,1)+'. '+
    'The lever isn\'t just conversion rate — also check Cancel/Paid: a family with 50% Reg→Paid but 2× cancellation is a net loss.</div></div>';

  h += '<div class="grid-4 mb14">'+
    tile('Campaign Families', String(CHS.length), 'Individual rows from CDE-010', 'neu') +
    tile('Active Codes', fmtNexact(totalCodes), 'CR.Codes across families', 'neu') +
    tile('Avg Paid Conv.', fmtPct(avgPaidPct,1), 'Weighted by reg volume', avgPaidPct<0.25?'dn':'up') +
    tile('Total Tracked Rev', fmt$(totalRev), 'From CDE-010 attribution', 'up') +
  '</div>';

  // Action recommendation summary
  var byTier = {SCALE:[], HOLD:[], OPTIMISE:[], PAUSE:[]};
  CHS.forEach(function(c){ byTier[actionTier(c).label].push(c); });

  h += '<div class="card card-pad-lg mb14">'+
    '<div class="card-title-lg mb12">Campaign Action Matrix</div>'+
    '<div class="card-sub mb12">'+CHS.length+' campaign families classified by combined Reg→Paid % AND Cancel/Paid retention. SCALE = strong conversion + retains subs. PAUSE = bleeds subs (C/P &gt;1.5×).</div>'+
    '<div class="grid-4">'+
      ['SCALE','HOLD','OPTIMISE','PAUSE'].map(function(tierName){
        var chs = byTier[tierName].slice().sort(function(a,b){return b.paid-a.paid}); // sort by volume within tier
        var tierColors = {
          'SCALE': {color:'#16a34a', bg:'rgba(22,163,74,.15)', advice:'Strong conversion + retains subs — invest more'},
          'HOLD':  {color:'#2563eb', bg:'rgba(37,99,235,.15)', advice:'Stable — maintain current spend'},
          'OPTIMISE':{color:'#d97706', bg:'rgba(217,119,6,.15)', advice:'Audit churn / quality issues'},
          'PAUSE': {color:'#dc2626', bg:'rgba(220,38,38,.15)', advice:'Heavy churn — losing far more than acquired'},
        };
        var t = tierColors[tierName];
        return '<div style="border:2px solid '+t.color+';border-radius:10px;padding:14px;background:'+t.bg+'">'+
          '<div style="font-size:18px;font-weight:800;color:'+t.color+';margin-bottom:4px">'+tierName+' <span style="font-size:14px;opacity:0.7">('+chs.length+')</span></div>'+
          '<div class="card-sub mb12" style="font-size:11px">'+t.advice+'</div>'+
          (chs.length ? '<div style="max-height:280px;overflow-y:auto">'+chs.map(function(c){
            return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid var(--c-border);gap:6px">'+
              '<span style="font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.family+'">'+c.family+'</span>'+
              '<span style="font-weight:700;color:'+t.color+';font-size:11px;white-space:nowrap">'+fmtPct(c.paid_pct,0)+' · '+c.cancel_ratio.toFixed(1)+'×</span>'+
            '</div>';
          }).join('')+'</div>' : '<div class="card-sub" style="font-size:11px;padding:10px 0">— none —</div>')+
        '</div>';
      }).join('')+
    '</div>'+
  '</div>';

  // Charts — focus on the volume contributors
  // Top 20 by reg volume (where the data signal is strongest)
  var top20 = CHS.slice().sort(function(a,b){return b.reg-a.reg}).slice(0,20);
  h += '<div class="grid-2 mb14">'+
    '<div class="card card-pad-lg">'+
      '<div class="card-title-lg mb12">Top 20 Families by Reg Volume · Conversion Rate</div>'+
      '<div class="card-sub mb12">Reg→Paid % for the biggest-volume families. Bar colour = action tier.</div>'+
      '<div class="chart-box h500"><canvas id="ch-sgc-bars"></canvas></div>'+
    '</div>'+
    '<div class="card card-pad-lg">'+
      '<div class="card-title-lg mb12">Conversion vs Retention · Quality Map</div>'+
      '<div class="card-sub mb12">X = Reg→Paid %. Y = Cancel/Paid ratio (lower better). Bubble size = Reg volume. Top-right = converts AND retains. Bottom-left = good but small.</div>'+
      '<div class="chart-box h500"><canvas id="ch-sgc-scatter"></canvas></div>'+
    '</div>'+
  '</div>';

  // Full table — every family
  h += '<div class="card card-pad-lg">'+
    '<div class="card-title-lg mb12">Full Channel Detail</div>'+
    '<div class="card-sub mb12">Ranked by Reg→Paid %. Cancel/Paid ratio &gt;1 means losing more than acquired.</div>'+
    '<div class="tbl-wrap"><table class="tbl">'+
      '<thead><tr><th>Family</th><th class="num">Codes</th><th class="num">Reg</th><th class="num">Free/Trial</th><th class="num">Paid</th><th class="num">Cancel</th><th class="num">Revenue</th><th class="num">Trial %</th><th class="num">Paid %</th><th class="num">ARPU</th><th class="num">Cancel/Paid</th><th>Action</th></tr></thead>'+
      '<tbody>'+
        CHS.map(function(c){
          var t = actionTier(c);
          return '<tr><td class="lbl" style="font-size:11.5px">'+c.family+'</td>'+
            '<td class="num">'+fmtNexact(c.codes)+'</td>'+
            '<td class="num">'+fmtNexact(c.reg)+'</td>'+
            '<td class="num">'+fmtNexact(c.free)+'</td>'+
            '<td class="num">'+fmtNexact(c.paid)+'</td>'+
            '<td class="num">'+fmtNexact(c.cancel)+'</td>'+
            '<td class="num">'+fmt$exact(c.rev)+'</td>'+
            '<td class="num">'+fmtPct(c.trial_pct,1)+'</td>'+
            '<td class="num"><span class="ind '+(c.paid_pct>=0.40?'good':c.paid_pct>=0.25?'':c.paid_pct>=0.15?'warn':'bad')+'">'+fmtPct(c.paid_pct,1)+'</span></td>'+
            '<td class="num">A$'+c.arpu.toFixed(0)+'</td>'+
            '<td class="num"><span class="ind '+(c.cancel_ratio>1.5?'bad':c.cancel_ratio>1.0?'warn':c.cancel_ratio<0.9?'good':'')+'">'+c.cancel_ratio.toFixed(2)+'×</span></td>'+
            '<td><span style="background:'+t.bg+';color:'+t.color+';padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap">'+t.label+'</span></td>'+
          '</tr>';
        }).join('')+
      '</tbody>'+
    '</table></div>'+
  '</div>';

  el.innerHTML = h;

  // Bar chart — top 20 by reg, showing paid %
  barChart('ch-sgc-bars', top20.map(function(c){return c.family.length>40?c.family.substr(0,40)+'…':c.family}), [
    { label:'Reg→Paid %', data:top20.map(function(c){return c.paid_pct*100}), backgroundColor:top20.map(function(c){return actionTier(c).color}) }
  ], { plugins:{legend:{display:false}}, indexAxis:'y' });

  // Scatter — paid_pct vs cancel_ratio
  var ctx = document.getElementById('ch-sgc-scatter');
  if(ctx && window.Chart){
    // Only show families with paid>=20 to reduce noise
    var scatterData = CHS.filter(function(c){return c.paid>=20});
    new Chart(ctx, {
      type:'bubble',
      data:{ datasets: scatterData.map(function(c){
        var t = actionTier(c);
        return {
          label:c.family,
          data:[{x:c.paid_pct*100, y:c.cancel_ratio, r:Math.sqrt(c.reg)/20+4}],
          backgroundColor:t.color+'aa',
          borderColor:t.color
        };
      })},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:function(ci){
            var c = scatterData[ci.datasetIndex];
            return c.family+': Paid '+fmtPct(c.paid_pct,1)+', Cancel/Paid '+c.cancel_ratio.toFixed(2)+'×, Reg '+fmtNexact(c.reg);
          }}}
        },
        scales:{
          x:{title:{display:true,text:'Reg → Paid %'}, grid:{color:getCSSVar('--c-border')}},
          y:{title:{display:true,text:'Cancel / Paid Ratio (lower better)'}, grid:{color:getCSSVar('--c-border')}, reverse:false}
        }
      }
    });
  }
};

// ─────────────────────────────────── RAW SIGNUP CODES (every CR.Code from CDE-011, uncategorized)
R.rawcodes = function(){

    tile('Total Rev', fmt$(totalRev), 'AUD revenue', 'up') +
