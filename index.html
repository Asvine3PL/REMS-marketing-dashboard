    '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
      '<input id="rcSearch" type="text" placeholder="Search code, template, media, region, URL, publication..." style="flex:1;min-width:300px;padding:8px 12px;border:1px solid var(--bdr);border-radius:6px;font-size:13px" />'+
      '<select id="rcMedia" style="padding:8px 12px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;background:white"><option value="">All media sources</option></select>'+
      '<select id="rcRegion" style="padding:8px 12px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;background:white"><option value="">All regions</option></select>'+
      '<select id="rcMinReg" style="padding:8px 12px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;background:white">'+
        '<option value="0">All codes</option>'+
        '<option value="10">≥10 reg</option>'+
        '<option value="50">≥50 reg</option>'+
        '<option value="100">≥100 reg</option>'+
        '<option value="500">≥500 reg</option>'+
      '</select>'+
      '<span id="rcCount" class="card-sub" style="margin-left:auto;font-weight:600"></span>'+
    '</div>'+
  '</div>';

  // Table
  h += '<div class="card card-pad-lg">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<div class="card-title-lg" style="margin:0">Signup Codes by Media Source</div>'+
      '<span class="card-sub" style="font-weight:400;flex:1">Click a Media row to expand its codes · Click any column to sort</span>'+
      '<button id="rcExpandAll" style="padding:6px 10px;border:1px solid var(--bdr);background:white;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600">Expand all</button>'+
      '<button id="rcCollapseAll" style="padding:6px 10px;border:1px solid var(--bdr);background:white;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600">Collapse all</button>'+
    '</div>'+
    '<div style="max-height:70vh;overflow:auto"><table class="tbl" id="rcTbl">'+
      '<thead style="position:sticky;top:0;background:white;z-index:2"><tr>'+
        '<th data-sort="c" data-nosort>Code / Media</th>'+
        '<th data-sort="t" data-nosort>Template</th>'+
        '<th data-sort="r" data-nosort>Region</th>'+
        '<th data-sort="spend" data-nosort class="num">Spend</th>'+
        '<th data-sort="reg" data-nosort class="num">Reg</th>'+
        '<th data-sort="wfs" data-nosort class="num">Trial</th>'+
        '<th data-sort="pd" data-nosort class="num">Paid</th>'+
        '<th data-sort="can" data-nosort class="num">Cancel</th>'+
        '<th data-sort="cpr" data-nosort class="num" title="Cost per Registration">CPR</th>'+
        '<th data-sort="cpf" data-nosort class="num" title="Cost per Free Trial">CPF</th>'+
        '<th data-sort="cpp" data-nosort class="num" title="Cost per Paid Sub">CPP</th>'+
        '<th data-sort="rp" data-nosort class="num">R→P %</th>'+
        '<th data-sort="cp" data-nosort class="num">C/P</th>'+
        '<th data-sort="rev" data-nosort class="num">Rev AUD</th>'+
      '</tr></thead>'+
      '<tbody id="rcBody"></tbody>'+
    '</table></div>'+
  '</div>';

  el.innerHTML = h;

  // Populate dropdowns
  var mediaSet = {}, regionSet = {};
  ALL.forEach(function(d){
    if(d.m) mediaSet[d.m] = (mediaSet[d.m]||0) + d.reg;
    if(d.r) regionSet[d.r] = (regionSet[d.r]||0) + d.reg;
  });
  var mediaSel = document.getElementById('rcMedia');
  Object.keys(mediaSet).sort(function(a,b){return mediaSet[b]-mediaSet[a]}).forEach(function(m){
    var o = document.createElement('option'); o.value = m;
    o.textContent = m + ' ('+fmtNexact(mediaSet[m])+')';
    mediaSel.appendChild(o);
  });
  var regionSel = document.getElementById('rcRegion');
  Object.keys(regionSet).sort(function(a,b){return regionSet[b]-regionSet[a]}).forEach(function(r){
    var o = document.createElement('option'); o.value = r;
    o.textContent = r + ' ('+fmtNexact(regionSet[r])+')';
    regionSel.appendChild(o);
  });

  // Render state
  var sortKey = 'reg', sortDir = -1; // desc by default
  var filtered = ALL.slice();
  var expanded = {}; // mediaKey -> true if expanded

  function applyFilters(){
    var s = (document.getElementById('rcSearch').value || '').trim().toLowerCase();
    var fm = document.getElementById('rcMedia').value;
    var fr = document.getElementById('rcRegion').value;
    var mn = parseInt(document.getElementById('rcMinReg').value, 10) || 0;
    // If user searches for a code/template, auto-expand matching groups
    var searching = s.length > 0;
    filtered = ALL.filter(function(d){
      if(d.reg < mn) return false;
      if(fm && d.m !== fm) return false;
      if(fr && d.r !== fr) return false;
      if(s){
        var hay = (d.c+' '+d.t+' '+d.m+' '+d.r+' '+(d.u||'')+' '+(d.p||'')).toLowerCase();
        if(hay.indexOf(s) === -1) return false;
      }
      return true;
    });
    // Auto-expand groups when searching so user sees the matches
    if(searching){
      var mediaInResults = {};
      filtered.forEach(function(d){ mediaInResults[d.m || '(Unspecified)'] = true; });
      Object.keys(mediaInResults).forEach(function(k){ expanded[k] = true; });
    }
    render();
  }

  function render(){
    // Group filtered codes by Media
    var groups = {}; // media -> { codes: [], reg, act, wfs, pd, can, rev, spend }
    filtered.forEach(function(d){
      var m = d.m || '(Unspecified)';
      if(!groups[m]) groups[m] = { media:m, codes:[], reg:0, act:0, wfs:0, pd:0, can:0, rev:0, spend:0 };
      var g = groups[m];
      g.codes.push(d);
      g.reg += d.reg; g.act += d.act; g.wfs += d.wfs;
      g.pd += d.pd; g.can += d.can; g.rev += d.rev;
      g.spend += (CODE_SPEND_MAP[d.c] || 0);
    });
    var groupList = Object.keys(groups).map(function(k){ return groups[k]; });

    // Sort the parent (Media) rows
    groupList.sort(function(a,b){
      var av, bv;
      if(sortKey === 'rp'){ av = a.reg ? a.pd/a.reg : 0; bv = b.reg ? b.pd/b.reg : 0; }
      else if(sortKey === 'cp'){ av = a.pd ? a.can/a.pd : 0; bv = b.pd ? b.can/b.pd : 0; }
      else if(sortKey === 'cpr'){ av = a.reg ? a.spend/a.reg : 0; bv = b.reg ? b.spend/b.reg : 0; }
      else if(sortKey === 'cpf'){ av = a.wfs ? a.spend/a.wfs : 0; bv = b.wfs ? b.spend/b.wfs : 0; }
      else if(sortKey === 'cpp'){ av = a.pd ? a.spend/a.pd : 0; bv = b.pd ? b.spend/b.pd : 0; }
      else if(sortKey === 'spend'){ av = a.spend; bv = b.spend; }
      else if(sortKey === 'm'){ av = a.media; bv = b.media; }
      else if(sortKey === 'c' || sortKey === 't' || sortKey === 'r'){
        av = a.reg; bv = b.reg;
        return -1 * ((av||0) - (bv||0));
      }
      else { av = a[sortKey]; bv = b[sortKey]; }
      if(typeof av === 'string'){ return sortDir * (av || '').localeCompare(bv || ''); }
      return sortDir * ((av||0) - (bv||0));
    });

    // Sort codes within each group
    groupList.forEach(function(g){
      g.codes.sort(function(a,b){
        var av, bv;
        var aSp = CODE_SPEND_MAP[a.c] || 0, bSp = CODE_SPEND_MAP[b.c] || 0;
        if(sortKey === 'rp'){ av = a.reg ? a.pd/a.reg : 0; bv = b.reg ? b.pd/b.reg : 0; }
        else if(sortKey === 'cp'){ av = a.pd ? a.can/a.pd : 0; bv = b.pd ? b.can/b.pd : 0; }
        else if(sortKey === 'cpr'){ av = a.reg ? aSp/a.reg : 0; bv = b.reg ? bSp/b.reg : 0; }
        else if(sortKey === 'cpf'){ av = a.wfs ? aSp/a.wfs : 0; bv = b.wfs ? bSp/b.wfs : 0; }
        else if(sortKey === 'cpp'){ av = a.pd ? aSp/a.pd : 0; bv = b.pd ? bSp/b.pd : 0; }
        else if(sortKey === 'spend'){ av = aSp; bv = bSp; }
        else { av = a[sortKey]; bv = b[sortKey]; }
        if(typeof av === 'string'){ return sortDir * (av || '').localeCompare(bv || ''); }
        return sortDir * ((av||0) - (bv||0));
      });
    });

    // Grand totals from filtered set
    var gReg = sum(filtered,'reg'), gAct = sum(filtered,'act'), gWfs = sum(filtered,'wfs');
    var gPd  = sum(filtered,'pd'),  gCan = sum(filtered,'can'), gRev = sum(filtered,'rev');
    var gSpend = filtered.reduce(function(s,d){ return s + (CODE_SPEND_MAP[d.c]||0); }, 0);
    var gRp = gReg ? gPd/gReg : 0;
    var gCp = gPd ? gCan/gPd : 0;
    var gCpr = gReg ? gSpend/gReg : 0;
    var gCpf = gWfs ? gSpend/gWfs : 0;
    var gCpp = gPd  ? gSpend/gPd  : 0;

    document.getElementById('rcCount').textContent = fmtNexact(filtered.length) + ' codes in ' +
      fmtNexact(groupList.length) + ' media groups · ' + fmtNexact(gReg) + ' reg · ' +
      fmtNexact(gPd) + ' paid · ' + fmt$(gSpend) + ' spend · ' + fmt$(gRev) + ' rev';

    // Build HTML
    var rows = [];

    function fmtCpx(spend, denom){
      if(!spend || !denom) return '—';
      var v = spend/denom;
      return 'A$'+(v < 10 ? v.toFixed(2) : Math.round(v).toLocaleString());
    }

    // Grand total row (top, so it's always visible)
    rows.push(
      '<tr class="rc-grand" style="background:#0f172a;color:white;font-weight:700">'+
        '<td colspan="3" style="padding:10px 12px;font-size:13px;letter-spacing:.02em">▣ GRAND TOTAL — '+fmtNexact(filtered.length)+' codes across '+fmtNexact(groupList.length)+' media groups</td>'+
        '<td class="num" style="color:white">'+(gSpend?fmt$(gSpend):'—')+'</td>'+
        '<td class="num" style="color:white">'+fmtNexact(gReg)+'</td>'+
        '<td class="num" style="color:white">'+fmtNexact(gWfs)+'</td>'+
        '<td class="num" style="color:white">'+fmtNexact(gPd)+'</td>'+
        '<td class="num" style="color:white">'+fmtNexact(gCan)+'</td>'+
        '<td class="num" style="color:white">'+fmtCpx(gSpend, gReg)+'</td>'+
        '<td class="num" style="color:white">'+fmtCpx(gSpend, gWfs)+'</td>'+
        '<td class="num" style="color:white">'+fmtCpx(gSpend, gPd)+'</td>'+
        '<td class="num" style="color:white">'+fmtPct(gRp,1)+'</td>'+
        '<td class="num" style="color:white">'+(gCp ? gCp.toFixed(2)+'×' : '—')+'</td>'+
        '<td class="num" style="color:white">'+fmt$exact(gRev)+'</td>'+
      '</tr>'
    );

    // Cap parent group rendering at 100 groups
    var groupCap = 100;
    var displayGroups = groupList.slice(0, groupCap);

    displayGroups.forEach(function(g){
      var isExpanded = !!expanded[g.media];
      var rp = g.reg ? g.pd/g.reg : 0;
      var cp = g.pd ? g.can/g.pd : 0;
      var rpColor = rp >= 0.30 ? 'color:#16a34a;font-weight:700' : (rp < 0.10 ? 'color:#dc2626' : '');
      var cpColor = cp > 1.5 ? 'color:#dc2626;font-weight:700' : (cp > 1.0 ? 'color:#d97706' : '');
      var chevron = isExpanded ? '▼' : '▶';
      var mediaKey = g.media.replace(/"/g,'&quot;');

      // Parent (Media) row — clickable
      rows.push(
        '<tr class="rc-parent" data-media="'+mediaKey+'" style="background:#f1f5f9;cursor:pointer;font-weight:700">'+
          '<td colspan="3" style="padding:10px 12px;font-size:13px">'+
            '<span style="display:inline-block;width:16px;color:#64748b">'+chevron+'</span>'+
            g.media+' <span class="card-sub" style="font-weight:400;margin-left:6px">('+fmtNexact(g.codes.length)+' code'+(g.codes.length>1?'s':'')+')</span>'+
          '</td>'+
          '<td class="num">'+(g.spend?fmt$(g.spend):'—')+'</td>'+
          '<td class="num">'+fmtNexact(g.reg)+'</td>'+
          '<td class="num">'+fmtNexact(g.wfs)+'</td>'+
          '<td class="num">'+fmtNexact(g.pd)+'</td>'+
          '<td class="num">'+fmtNexact(g.can)+'</td>'+
          '<td class="num">'+fmtCpx(g.spend, g.reg)+'</td>'+
          '<td class="num">'+fmtCpx(g.spend, g.wfs)+'</td>'+
          '<td class="num">'+fmtCpx(g.spend, g.pd)+'</td>'+
          '<td class="num" style="'+rpColor+'">'+fmtPct(rp,1)+'</td>'+
          '<td class="num" style="'+cpColor+'">'+(cp ? cp.toFixed(2)+'×' : '—')+'</td>'+
          '<td class="num">'+fmt$exact(g.rev)+'</td>'+
        '</tr>'
      );

      // Child rows (codes) — only if expanded
      if(isExpanded){
        var codeCap = 200;
        var codesDisplay = g.codes.slice(0, codeCap);
        codesDisplay.forEach(function(d){
          var sp = CODE_SPEND_MAP[d.c] || 0;
          var crp = d.reg ? d.pd/d.reg : 0;
          var ccp = d.pd ? d.can/d.pd : 0;
          var crpColor = crp >= 0.30 ? 'color:#16a34a;font-weight:600' : (crp < 0.10 ? 'color:#dc2626' : '');
          var ccpColor = ccp > 1.5 ? 'color:#dc2626;font-weight:600' : (ccp > 1.0 ? 'color:#d97706' : '');
          rows.push(
            '<tr class="rc-child">'+
              '<td style="font-family:monospace;font-size:12px;padding-left:32px">'+d.c+'</td>'+
              '<td style="font-size:12px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(d.t||'').replace(/"/g,'&quot;')+'">'+(d.t||'—')+'</td>'+
              '<td style="font-size:12px">'+(d.r||'—')+'</td>'+
              '<td class="num">'+(sp?fmt$exact(sp):'—')+'</td>'+
              '<td class="num">'+fmtNexact(d.reg)+'</td>'+
              '<td class="num">'+fmtNexact(d.wfs)+'</td>'+
              '<td class="num">'+fmtNexact(d.pd)+'</td>'+
              '<td class="num">'+fmtNexact(d.can)+'</td>'+
              '<td class="num">'+fmtCpx(sp, d.reg)+'</td>'+
              '<td class="num">'+fmtCpx(sp, d.wfs)+'</td>'+
              '<td class="num">'+fmtCpx(sp, d.pd)+'</td>'+
              '<td class="num" style="'+crpColor+'">'+fmtPct(crp,1)+'</td>'+
              '<td class="num" style="'+ccpColor+'">'+(ccp ? ccp.toFixed(2)+'×' : '—')+'</td>'+
              '<td class="num">'+fmt$exact(d.rev)+'</td>'+
            '</tr>'
          );
        });
        if(g.codes.length > codeCap){
          rows.push('<tr><td colspan="14" style="text-align:center;padding:8px;background:#fef9c3;font-size:12px"><strong>Showing top '+codeCap+' of '+fmtNexact(g.codes.length)+' codes in this group.</strong> Use search/filters to narrow.</td></tr>');
        }
      }
    });

    if(groupList.length > groupCap){
      rows.push('<tr><td colspan="14" style="text-align:center;padding:12px;background:#fef9c3;font-size:12px"><strong>Showing top '+groupCap+' of '+fmtNexact(groupList.length)+' media groups.</strong></td></tr>');
    }

    var body = document.getElementById('rcBody');
    body.innerHTML = rows.join('');

    // Attach expand/collapse click handlers
    body.querySelectorAll('tr.rc-parent').forEach(function(tr){
      tr.addEventListener('click', function(){
        var m = tr.getAttribute('data-media');
        expanded[m] = !expanded[m];
        render();
      });
    });
  }

  // Expand-all / Collapse-all helpers (wired up to header buttons)
  function setAllExpanded(state){
    var groupSet = {};
    filtered.forEach(function(d){ groupSet[d.m || '(Unspecified)'] = true; });
    if(state){
      Object.keys(groupSet).forEach(function(k){ expanded[k] = true; });
    } else {
      expanded = {};
    }
    render();
  }

  // Wire up controls
  ['rcSearch','rcMedia','rcRegion','rcMinReg'].forEach(function(id){
    document.getElementById(id).addEventListener('input', applyFilters);
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.getElementById('rcExpandAll').addEventListener('click', function(){ setAllExpanded(true); });
  document.getElementById('rcCollapseAll').addEventListener('click', function(){ setAllExpanded(false); });

  // Wire up sortable headers
  document.querySelectorAll('#rcTbl th[data-sort]').forEach(function(th){
    th.style.cursor = 'pointer';
    th.style.userSelect = 'none';
    th.addEventListener('click', function(){
      var k = th.getAttribute('data-sort');
      if(sortKey === k){ sortDir = -sortDir; }
      else { sortKey = k; sortDir = (k === 'c' || k === 't' || k === 'm' || k === 'r') ? 1 : -1; }
      // Update header arrow indicators
      document.querySelectorAll('#rcTbl th[data-sort]').forEach(function(x){
        x.textContent = x.textContent.replace(/ [▲▼]$/, '');
      });
      th.textContent = th.textContent + (sortDir === 1 ? ' ▲' : ' ▼');
      render();
    });
  });

  // Initial render
  applyFilters();
};

// ─────────────────────────────────── MEDIA SOURCE (Signup Media Source from CDE-010)
R.mediasrc = function(){
  var el = document.getElementById('p-mediasrc');
  // Filter out (Unspecified) for the main analysis; show it separately
  var SRC = MEDIA_SOURCES.filter(function(s){return s.src !== '(Unspecified)' && s.reg >= 20});
  var SRC_BY_PAID = SRC.slice().sort(function(a,b){return b.paid-a.paid});
  var SRC_BY_QUALITY = SRC.filter(function(s){return s.paid>=30}).slice().sort(function(a,b){return b.r2p-a.r2p});
  var SRC_BY_LEAK = SRC.filter(function(s){return s.paid>=20}).slice().sort(function(a,b){return b.cancel_ratio-a.cancel_ratio});

  var totReg = sum(MEDIA_SOURCES,'reg');
  var totPaid = sum(MEDIA_SOURCES,'paid');
  var totCancel = sum(MEDIA_SOURCES,'cancel');
  var totRev = sum(MEDIA_SOURCES,'rev');
  var unspec = MEDIA_SOURCES.find(function(s){return s.src==='(Unspecified)'}) || {reg:0};

  // Source categorization for grouped view
  function categorize(src){
    var s = src.toLowerCase();
    if(s==='adwords') return 'Paid · Adwords';
    if(s==='facebook') return 'Paid · Meta (Facebook)';
    if(s==='tik tok ads') return 'Paid · TikTok';
    if(s==='online') return 'Online Promo (Rokt/Popups)';
    if(s.indexOf('referral')>=0 || s==='tell a friend') return 'Word of Mouth';
    if(s.indexOf('search')>=0 || s==='google or other web search' || s==='web search') return 'Search (Organic + Branded)';
    if(s.indexOf('email')>=0 || s==='reading eggs sms') return 'Email / SMS';
    if(s.indexOf('app store')>=0 || s.indexOf('play store')>=0) return 'App Stores';
    if(s.indexOf('social media')>=0 || s==='instagram') return 'Organic Social';
    if(s==='radio' || s==='saw it advertised on tv' || s.indexOf('cinema')>=0) return 'Broadcast (TV/Radio/Cinema)';
    if(s==='print' || s.indexOf('newspaper')>=0 || s==='in person poster') return 'Print';
    if(s.indexOf('blog')>=0 || s.indexOf('podcast')>=0 || s==='public relations') return 'PR / Content';
    if(s.indexOf('book')>=0) return 'Product (RE Books)';
    if(s.indexOf('homeschool')>=0 || s==='affiliates' || s.indexOf('partner')>=0 || s==='play centres') return 'Partners / Affiliates';
    return 'Other';
  }
  var byCat = {};
  SRC.forEach(function(s){
    var c = categorize(s.src);
    if(!byCat[c]) byCat[c] = {reg:0,free:0,paid:0,cancel:0,rev:0,sources:0};
    byCat[c].reg += s.reg; byCat[c].free += s.free; byCat[c].paid += s.paid;
    byCat[c].cancel += s.cancel; byCat[c].rev += s.rev; byCat[c].sources += 1;
  });
  var CATS = Object.keys(byCat).map(function(c){
    var d = byCat[c];
    return {
      cat: c, sources: d.sources, reg: d.reg, free: d.free, paid: d.paid, cancel: d.cancel, rev: d.rev,
      net: d.paid - d.cancel,
      r2p: d.reg ? d.paid/d.reg : 0,
      cancel_ratio: d.paid ? d.cancel/d.paid : 0,
      arpu: d.paid ? d.rev/d.paid : 0,
    };
  }).sort(function(a,b){return b.paid-a.paid});

  var h = '<div class="ph"><div><div class="pt">Media Source · How They Heard About Us <span style="background:#fee2e2;color:#991b1b;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.05em;margin-left:8px;vertical-align:middle">WEB ONLY</span></div><div class="ps">Aggregated by Signup Media Source field from CDE-010 — user-declared at web signup. 34 distinct sources. iOS/Android app users do not pass through this question.</div></div>'+
    '<div class="pdr"><span class="badge gry">Source: GMF CDE-010 col F (Signup Media Source)</span></div></div>';

  // Headline insight
  var bestQ = SRC_BY_QUALITY[0];
  var worstLeak = SRC_BY_LEAK[0];
  h += '<div class="alert blu mb14"><span class="alert-icon">💡</span><div>'+
    '<strong>Word-of-mouth is the highest-quality source in the business.</strong> '+
    bestQ.src+' converts '+fmtPct(bestQ.r2p,1)+' of regs to paid (vs '+fmtPct(totPaid/totReg,1)+' overall) and has a Cancel/Paid of '+bestQ.cancel_ratio.toFixed(2)+'×. '+
    'Compare to '+worstLeak.src+': '+fmtPct(worstLeak.r2p,1)+' convert, '+worstLeak.cancel_ratio.toFixed(2)+'× cancel/paid.</div></div>';

  h += '<div class="alert red mb14"><span class="alert-icon">🚨</span><div>'+
    '<strong>"Online" is the second-biggest source by reg (52K) and the single biggest absolute leak: net -'+fmtNexact(7454)+' subs lifetime.</strong> '+
    'This is the Rokt / popup / exit-intent traffic. AMER alone: 23K reg, 4,677 paid, 9,846 cancel (2.11× C/P, -5,169 net). '+
    'Radio is the worst by ratio (8.34× cancel/paid) but small; <strong>Apple App Store</strong> bleeds 3.20× and is mid-sized.</div></div>';

  // KPI row
  h += '<div class="grid-4 mb14">'+
    tile('Total Sources', String(MEDIA_SOURCES.length), '34 distinct values', 'neu') +
    tile('Unspecified', fmtPct(unspec.reg/totReg, 1), fmtNexact(unspec.reg)+' regs with no source', unspec.reg/totReg>0.20?'dn':'neu') +
    tile('Best Quality Source', SRC_BY_QUALITY[0].src.length>16?SRC_BY_QUALITY[0].src.substr(0,16)+'…':SRC_BY_QUALITY[0].src, fmtPct(SRC_BY_QUALITY[0].r2p,1)+' Reg→Paid', 'up') +
    tile('Worst Leak Source', SRC_BY_LEAK[0].src.length>16?SRC_BY_LEAK[0].src.substr(0,16)+'…':SRC_BY_LEAK[0].src, SRC_BY_LEAK[0].cancel_ratio.toFixed(2)+'× Cancel/Paid', 'dn') +
  '</div>';

  // Grouped category view
  h += '<div class="card card-pad-lg mb14">'+
    '<div class="card-title-lg mb12">Source Categories · Bucketed View</div>'+
    '<div class="card-sub mb12">34 sources rolled up into '+CATS.length+' logical categories.</div>'+
    '<div class="tbl-wrap"><table class="tbl">'+
      '<thead><tr><th>Category</th><th class="num">Sources</th><th class="num">Reg</th><th class="num">Paid</th><th class="num">Cancel</th><th class="num">Net</th><th class="num">Revenue</th><th class="num">Reg→Paid</th><th class="num">Cancel/Paid</th><th class="num">ARPU</th></tr></thead>'+
      '<tbody>'+
        CATS.map(function(c){
          var netCls = c.net>=0 ? 'good' : 'bad';
          var cpCls = c.cancel_ratio<0.90 ? 'good' : c.cancel_ratio<1.05 ? '' : c.cancel_ratio<1.50 ? 'warn' : 'bad';
          var rpCls = c.r2p>=0.40 ? 'good' : c.r2p>=0.25 ? '' : c.r2p>=0.15 ? 'warn' : 'bad';
          return '<tr><td class="lbl"><strong>'+c.cat+'</strong></td>'+
            '<td class="num">'+c.sources+'</td>'+
            '<td class="num">'+fmtNexact(c.reg)+'</td>'+
            '<td class="num">'+fmtNexact(c.paid)+'</td>'+
            '<td class="num">'+fmtNexact(c.cancel)+'</td>'+

async function aiSend(){

async function aiAsk(q){
  var msgs = document.getElementById('ai-msgs');
  msgs.innerHTML += '<div class="ai-msg user">'+q+'</div>';
  msgs.innerHTML += '<div class="ai-msg bot" id="ai-load">⏳ Analysing your data…</div>';
  msgs.scrollTop = msgs.scrollHeight;
  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:aiCtx(),
        messages:[{ role:'user', content:q }]
      })
    });
    var data = await resp.json();
    var txt = data.content ? data.content.map(function(b){return b.type==='text'?b.text:''}).join('') : 'No response.';
    document.getElementById('ai-load').outerHTML = '<div class="ai-msg bot">'+txt.replace(/\n/g,'<br>')+'</div>';
  } catch(e) {
    document.getElementById('ai-load').outerHTML = '<div class="ai-msg bot">⚠️ AI assistant requires running inside Claude.ai. Open this file as an artifact in Claude to chat.</div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

/* ═══════════════════════════════════════════════════════════════════════════
   GLOBAL FILTER STATE
   Single source of truth — every panel reads from FILTERS via data accessors.
   When a filter changes, we invalidate the rendered cache and re-render.
   ═══════════════════════════════════════════════════════════════════════════ */
var FILTERS = {
  fy:    'FY26',  // FY25 | FY26 | vs
  pr:    'YTD',   // MTD | QTD | YTD | FULL
  rg:    'All',   // All | APAC | EMEA | AMER
  prod:  'All Products',
  os:    'All',
  ch:    'All'
};

// Period → month-slice mapping. Months array goes Jul=0 ... Jun=11.
// YTD covers Jul through May (current month is May in our demo).
var PERIOD_RANGES = {
  'MTD':  [10, 11],  // Just May
  'QTD':  [8, 11],   // Mar–May
  'YTD':  [0, 11],   // Jul–May
  'FULL': [0, 12],   // Jul–Jun (full FY)
};

// Multipliers applied to numeric values across the dashboard.
// These keep the dummy data coherent under filtering.
var REGION_MULT = { 'All':1.0, 'APAC':0.348, 'EMEA':0.271, 'AMER':0.381 };
var OS_MULT     = { 'All':1.0, 'Web':0.46, 'iOS':0.32, 'Android':0.22 };
var PROD_MULT   = { 'All Products':1.0, 'Reading Eggs':0.76, 'Mathseeds':0.18, 'Mathletics':0.04, 'Bookshop':0.02 };

// Returns the composite multiplier for the current filter state.
function filterMult(){
  return (REGION_MULT[FILTERS.rg]||1) * (OS_MULT[FILTERS.os]||1) * (PROD_MULT[FILTERS.prod]||1);
}

// Returns the month-slice [start, end) for the current period filter.
function periodSlice(){
  return PERIOD_RANGES[FILTERS.pr] || [0, 12];
}

// Apply filters to GLOBAL_MO — returns sliced + multiplied copy.
// When FILTERS.fy === 'FY25', swap the headline reg value with FY25's number
// so the entire dashboard reflects FY25 totals (AU FY = Jul-Jun).
function filteredGlobalMo(){
  var slice = periodSlice();
  var m = filterMult();
  var useFY25 = (FILTERS.fy === 'FY25');
  return GLOBAL_MO.slice(slice[0], slice[1]).map(function(r){
    if(useFY25){
      // FY25 view — surface fy25 reg as headline, scale spend back roughly 15% (FY25 spend was lower)
      return {
        m:r.m,
        reg:  Math.round(r.fy25 * m),
        spend:Math.round(r.spend * m * 0.85),  // FY25 spend ~85% of FY26
        web:    Math.round((r.web||0)     * m * 0.85),
        ios:    Math.round((r.ios||0)     * m * 0.85),
        android:Math.round((r.android||0) * m * 0.85),
        totmkt: Math.round((r.totmkt||0)  * m * 0.85),
        free: Math.round(r.fy25 * 0.55 * m),    // approximated CR
        cr:   0.55,
        rcpa: r.fy25 ? (r.spend*0.85)/r.fy25 : 0,
        fcpa: r.fy25 ? (r.spend*0.85)/(r.fy25*0.55) : 0,
        fy25: Math.round(r.fy25 * m),
        tgt:  Math.round(r.tgt * m),
      };
    }
    return {
      m:r.m,
      reg:  Math.round(r.reg * m),
      spend:Math.round(r.spend * m),
      web:    Math.round((r.web||0)     * m),
      ios:    Math.round((r.ios||0)     * m),
      android:Math.round((r.android||0) * m),
      totmkt: Math.round((r.totmkt||0)  * m),
      free: Math.round(r.free * m),
      cr:   r.cr,
      rcpa: r.rcpa,
      fcpa: r.fcpa,
      fy25: Math.round(r.fy25 * m),
      tgt:  Math.round(r.tgt * m),
    };
  });
}

// Apply filters to REGIONS — collapses to a single region if filtered.
function filteredRegions(){
  var m = (OS_MULT[FILTERS.os]||1) * (PROD_MULT[FILTERS.prod]||1);
  var useFY25 = (FILTERS.fy === 'FY25');
  var scaleSpend = useFY25 ? 0.85 : 1;
  function mapRegion(r){
    return Object.assign({}, r, {
      reg:   Math.round((useFY25 ? r.fy25 : r.reg) * m),
      spend: Math.round(r.spend * m * scaleSpend),
      free:  Math.round((useFY25 ? r.fy25*0.55 : r.free) * m),
      fy25:  Math.round(r.fy25 * m),
      tgt:   Math.round(r.tgt * m),
    });
  }
  if(FILTERS.rg !== 'All'){
    var r = REGIONS.find(function(x){return x.code===FILTERS.rg});
    if(r) return [mapRegion(r)];
  }
  return REGIONS.map(mapRegion);
}

// Filtered monthly revenue — uses real per-region data if region filtered,
// otherwise global with OS multiplier applied
function filteredRevenueMo(){
  var slice = periodSlice();
  // If region is filtered, use the per-region real data
  var source = (FILTERS.rg !== 'All' && REVENUE_BY_REGION_MO[FILTERS.rg])
    ? REVENUE_BY_REGION_MO[FILTERS.rg]
    : REVENUE_MO;
  var rows = source.slice(slice[0], slice[1]);
  // Apply OS filter if not All — show only the OS column as total
  if(FILTERS.os !== 'All'){
    var osKey = FILTERS.os.toLowerCase(); // web/ios/android
    return rows.map(function(r){
      var v = r[osKey] || 0;
      return Object.assign({}, r, {
        total: v,
        fy25: Math.round(r.fy25 * (osKey==='web'?0.45:osKey==='ios'?0.38:0.11)),
        target: Math.round(r.target * (osKey==='web'?0.45:osKey==='ios'?0.38:0.11)),
      });
    });
  }
  return rows.map(function(r){ return Object.assign({}, r); });
}

// Filtered revenue by region — uses real numbers, optionally collapses to one
function filteredRevenueRegion(){
  var list = REVENUE_REGION;
  if(FILTERS.rg !== 'All'){
    return list.filter(function(r){return r.code===FILTERS.rg});
  }
  return list.slice();
}

// Filter-aware sum across GLOBAL_MO
function filterPanelLabel(){
  var bits = [];
  if(FILTERS.fy !== 'FY26') bits.push(FILTERS.fy);
  if(FILTERS.pr !== 'YTD') bits.push(FILTERS.pr);
  if(FILTERS.rg !== 'All') bits.push(FILTERS.rg);
  if(FILTERS.prod !== 'All Products') bits.push(FILTERS.prod);
  if(FILTERS.os !== 'All') bits.push(FILTERS.os);
  if(FILTERS.ch !== 'All') bits.push(FILTERS.ch);
  return bits.length ? bits.join(' · ') : 'All FY26 YTD · Global';
}

function setF(grp, val){
  // toggle pill state in same group
  var pills = document.querySelectorAll('.fb-grp .pill');
  pills.forEach(function(p){
    if(p.onclick && p.onclick.toString().includes("'"+grp+"'")) p.classList.remove('on');
  });
  event.currentTarget.classList.add('on');
  // Update filter state
  FILTERS[grp] = val;
  // Re-render everything: clear cache so panel re-runs, update KPI strip
  RENDERED = {};
  renderKpiStrip();
  // Update the filter chip in the header
  updateFilterChip();
  // Re-render current panel
  setTimeout(function(){
    R[CURRENT] && R[CURRENT]();
    RENDERED[CURRENT] = true;
  }, 20);
}

// Select-based filters (Product, OS, Channel)
function setFSel(grp, val){
  FILTERS[grp] = val;
  RENDERED = {};
  renderKpiStrip();
  updateFilterChip();
  setTimeout(function(){
    R[CURRENT] && R[CURRENT]();
    RENDERED[CURRENT] = true;
  }, 20);
}

// Update a small chip showing what's currently filtered
function updateFilterChip(){
  var chip = document.getElementById('filter-chip');
  if(!chip) return;
  var label = filterPanelLabel();
  var hasFilter = (FILTERS.fy!=='FY26') || (FILTERS.pr!=='YTD') ||
                  (FILTERS.rg!=='All') || (FILTERS.prod!=='All Products') ||
                  (FILTERS.os!=='All') || (FILTERS.ch!=='All');
  chip.textContent = label;
  chip.style.display = hasFilter ? 'inline-flex' : 'none';
}

function clearFilters(){
  FILTERS = { fy:'FY26', pr:'YTD', rg:'All', prod:'All Products', os:'All', ch:'All' };
  // Reset all pills
  document.querySelectorAll('.fb-grp .pill').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.fb-grp .pill').forEach(function(p){
    if(!p.onclick) return;
    var txt = p.onclick.toString();
    if(txt.includes("'fy','FY26'") || txt.includes("'pr','YTD'") || txt.includes("'rg','All'")){
      p.classList.add('on');
    }
  });
  // Reset selects
  var fp = document.getElementById('f-prod'); if(fp) fp.value = 'All Products';
  var fo = document.getElementById('f-os'); if(fo) fo.value = 'All';
  var fc = document.getElementById('f-ch'); if(fc) fc.value = 'All';
  RENDERED = {};
  renderKpiStrip();
  updateFilterChip();
  setTimeout(function(){ R[CURRENT] && R[CURRENT](); RENDERED[CURRENT]=true; }, 20);
}
function toggleTheme(){
  var html = document.documentElement, t = html.getAttribute('data-theme');
  var newT = t==='dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newT);
  var tog = document.getElementById('dark-tog'); if(tog) tog.className = 'tog '+(newT==='dark'?'on':'off');
  var btn = document.getElementById('theme-btn'); if(btn) btn.textContent = newT==='dark'?'☀️':'🌙';
  // Re-render current
  RENDERED = {};
  setTimeout(function(){ nav(CURRENT); }, 30);
}

  alert('📊 File received: '+el.files[0].name+'\n\nIn production, this will parse the GMF workbook and replace the demo data — every panel will re-render with your live numbers.');

function exportCSV(){
  var rows = [['Month','Registrations','Spend','Free Subs','Reg CPA','Free Sub CPA','CR%','vs FY25','vs Target']];
  GLOBAL_MO.forEach(function(r){
    rows.push([r.m, r.reg, r.spend, r.free, r.rcpa, r.fcpa, (r.cr*100).toFixed(1)+'%', r.fy25, r.tgt]);
  });
  var csv = rows.map(function(r){return r.join(',')}).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'gmf-snapshot-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
